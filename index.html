<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"/>
<title>AI Imagen</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
/* --- Design System --- */
:root {
    --bg: #09090b;
    --chat-bg: #000000;
    --card: #18181b;
    --accent: #d1fa31;
    --pi-purple: #611f69;
    --pi-gold: #fbbf24;
    --text-main: #ffffff;
    --text-sub: #a1a1aa;
    --border: #27272a;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--chat-bg); color: var(--text-main);
    display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
    direction: rtl; 
}

/* --- Landing Page --- */
.landing-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #000; z-index: 9999;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px; text-align: center;
    transition: opacity 0.5s ease;
}

.landing-logo-text {
    font-size: 48px; font-weight: 900; margin-bottom: 20px;
    background: linear-gradient(135deg, var(--pi-purple) 0%, var(--pi-gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(97, 31, 105, 0.4));
    letter-spacing: -1px;
}

.landing-desc { color: #888; margin-bottom: 30px; font-size: 14px; line-height: 1.6; }

.model-tags { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; }
.tag {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    padding: 6px 12px; border-radius: 20px; font-size: 11px; color: var(--text-sub);
    cursor: default; pointer-events: none;
}

.pi-login-btn {
    background: var(--pi-purple);
    color: var(--pi-gold);
    border: 1px solid var(--pi-gold);
    padding: 12px 40px; border-radius: 30px;
    font-weight: 800; font-size: 16px; cursor: pointer;
    box-shadow: 0 0 25px rgba(97, 31, 105, 0.4);
    display: flex; align-items: center; gap: 10px;
    transition: transform 0.2s;
}
.pi-login-btn:active { transform: scale(0.95); }
.pi-login-btn svg { width: 22px; height: 22px; fill: var(--pi-gold); }

/* --- Header --- */
.header {
    padding: 10px 16px; background: rgba(9, 9, 11, 0.95);
    backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    height: 60px; flex-shrink: 0; z-index: 100;
}
.header-title-area {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    padding: 4px 8px; border-radius: 12px; transition: 0.2s;
}
.header-title-area:active { background: rgba(255,255,255,0.05); }
.user-info-display {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 600; color: var(--pi-gold);
    background: rgba(97, 31, 105, 0.2); padding: 2px 10px; border-radius: 12px;
    border: 1px solid rgba(251, 191, 36, 0.3); margin-top: 4px;
}
.header-actions { display: flex; gap: 8px; }
.icon-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text-main); padding: 0 14px; height: 34px; border-radius: 18px;
    font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px;
    font-weight: 600; transition: 0.2s;
}
.icon-btn:active { transform: scale(0.95); }

/* --- Chat & Content --- */
.chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 20px; }
.message { display: flex; flex-direction: column; max-width: 90%; animation: slideUp 0.3s ease; }
.message.user { align-self: flex-end; } 
.message.bot { align-self: flex-start; }

.msg-bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
.message.user .msg-bubble { background: #27272a; color: #fff; border-bottom-left-radius: 4px; }
.message.bot .msg-bubble { background: transparent; padding: 0; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; width: 100%; max-width: 320px; }

/* Animation */
.loading-box {
    width: 280px; height: 280px;
    border-radius: 20px;
    position: relative; overflow: hidden;
    background: #000; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
}
.blur-wave {
    position: absolute; inset: -50%;
    background: conic-gradient(from 0deg, transparent 0deg, var(--accent) 100deg, transparent 180deg, #a855f7 260deg, transparent 360deg);
    filter: blur(40px); opacity: 0.5;
    animation: rotateWave 4s linear infinite;
}
.loading-text {
    position: relative; z-index: 2; font-weight: 700; font-size: 13px; color: white;
    background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 30px;
    backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
    animation: pulse 1.5s ease-in-out infinite;
}
@keyframes rotateWave { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes pulse { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

/* Image Style */
.msg-image { 
    width: 100%; height: auto; display: block; 
    opacity: 0; transition: opacity 1.5s ease; 
}
.msg-image.loaded { opacity: 1; }

.download-bar { padding: 12px; background: #141414; display: flex; justify-content: center; border-top: 1px solid #222; }
.d-btn { background: var(--accent); color: black; border: none; padding: 10px 0; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; width: 100%; transition: 0.2s; }

/* --- Footer --- */
.footer-container { background: #09090b; border-top: 1px solid var(--border); padding-bottom: max(10px, env(safe-area-inset-bottom)); z-index: 100; position: relative; }

.control-bar { display: flex; gap: 10px; padding: 8px 12px 0 12px; position: relative; }

.aspect-btn {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 6px 12px; color: var(--text-sub);
    font-size: 12px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 8px; min-width: 90px; justify-content: space-between;
}

.input-row { display: flex; gap: 8px; padding: 10px 12px; align-items: flex-end; }
.input-box { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 14px 18px; color: white; outline: none; resize: none; max-height: 120px; font-size: 15px; }
.send-btn { 
    width: 48px; height: 48px; border-radius: 50%; 
    background: var(--accent); border: none; cursor: pointer; 
    display: flex; align-items: center; justify-content: center; 
    transition: 0.3s;
    font-weight: 700; font-size: 12px;
}
.send-btn:disabled { background: #333; cursor: not-allowed; }
.countdown-text { color: var(--accent); font-size: 10px; text-align: center; line-height: 1; }

/* --- Menus --- */
.model-menu, .aspect-menu-dropdown {
    background: rgba(20, 20, 24, 0.98); backdrop-filter: blur(20px);
    border: 1px solid var(--border); border-radius: 16px;
    display: none; flex-direction: column; gap: 5px; box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
}

.model-menu { position: absolute; top: 60px; left: 0; right: 0; z-index: 90; padding: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }

/* Aspect Menu Fixed Positioning */
.aspect-menu-dropdown { 
    position: absolute; 
    bottom: 100%; /* تظهر فوق الزر */
    right: 12px; left: auto;
    width: 200px; 
    margin-bottom: 12px; 
    padding: 8px; 
    z-index: 200;
}

.menu-option {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px; background: rgba(255,255,255,0.03); border-radius: 10px; cursor: pointer;
    border: 1px solid transparent; transition: 0.2s;
}
.menu-option:hover { background: rgba(255,255,255,0.08); }
.menu-option.active { border-color: var(--accent); background: rgba(209, 250, 49, 0.05); }

/* --- Gallery & Save Modal --- */
.modal-overlay { 
    position: fixed; inset: 0; background: #000; z-index: 500; 
    display: none; flex-direction: column; 
}
.modal-header { 
    padding: 15px; border-bottom: 1px solid var(--border); 
    display: flex; justify-content: space-between; align-items: center; background: #111; 
}
.gallery-grid { 
    flex: 1; overflow-y: auto; padding: 12px; 
    display: grid; grid-template-columns: repeat(2, 1fr); 
    gap: 12px; align-content: start;
}
.gallery-item { 
    position: relative; border-radius: 12px; overflow: hidden; 
    border: 1px solid var(--border); background: #111;
    display: flex; flex-direction: column; 
}
.gallery-item img {
    width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block;
}
.gallery-actions { 
    display: flex; gap: 8px; padding: 8px; background: #18181b; 
    border-top: 1px solid #222;
}
.g-btn { 
    flex: 1; border: none; padding: 8px 0; font-size: 11px; 
    cursor: pointer; color: white; border-radius: 6px; font-weight: 700; 
    display: flex; align-items: center; justify-content: center;
}
.g-del { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
.g-down { background: var(--accent); color: black; }

/* Save Help Modal */
.save-help-content {
    flex: 1; display: flex; flex-direction: column; 
    align-items: center; justify-content: center; padding: 20px;
}
.save-help-img {
    max-width: 100%; max-height: 60vh; border-radius: 12px; 
    border: 2px solid var(--accent); margin-bottom: 20px;
}
.save-help-text {
    color: white; text-align: center; margin-bottom: 20px; font-size: 16px;
}

@keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

    <div id="landingPage" class="landing-overlay">
        <div class="landing-logo-text">AI Imagen</div>
        <div class="landing-desc" id="txtLandingDesc">توليد صور احترافية باستخدام أحدث تقنيات الذكاء الاصطناعي</div>
        
        <div class="model-tags">
            <div class="tag">Nano Banana</div>
            <div class="tag">GPT Image</div>
            <div class="tag">Klein 4B</div>
            <div class="tag">Klein 9B</div>
        </div>

        <button class="pi-login-btn" onclick="authenticatePi()">
            <svg viewBox="0 0 32 32"><path d="M16 32C7.163 32 0 24.837 0 16S7.163 0 16 0s16 7.163 16 16-7.163 16-16 16zm-2.5-22h-3v12h3V10zm8 0h-3v12h3V10z"/></svg>
            <span id="txtLogin">Pi Login</span>
        </button>
    </div>

    <div class="header">
        <div style="display:flex; flex-direction:column;">
            <div class="header-title-area" onclick="toggleModelMenu()">
                <div style="font-weight:700; font-size:16px;" id="headerModelName">Nano Banana</div>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="#777" id="modelChevron" style="transition:0.3s"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
            </div>
            <div id="piUserInfo" class="user-info-display" style="display:none;">
                <span>@<span id="txtUsername">...</span></span>
            </div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" onclick="toggleLanguage()" id="langBtn">EN</button>
            <button class="icon-btn" onclick="openGallery()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22 16V4c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2zm-11-4l2.03 2.71L16 11l4 5H8l3-4z"/></svg>
                <span id="txtGallery">معرضي</span>
            </button>
        </div>
    </div>

    <div class="model-menu" id="modelMenu"></div>

    <div class="chat-container" id="chatContainer">
        <div style="text-align:center; color:#555; margin-top:50px;" id="emptyMsg">
            أهلاً بك في AI Imagen <br> اختر الموديل واكتب ما تتخيله
        </div>
    </div>

    <div class="footer-container">
        <div class="control-bar">
            <div class="aspect-menu-dropdown" id="aspectMenu">
                </div>
            
            <button class="aspect-btn" id="aspectTriggerBtn" onclick="toggleAspectMenu(event)">
                <div style="display:flex; align-items:center; gap:8px;">
                    <span id="currentAspectIcon"></span>
                    <span id="currentAspectLabel">1:1</span>
                </div>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="#777"><path d="M7 10l5 5 5-5z"/></svg>
            </button>
        </div>

        <div class="input-row">
            <textarea id="promptInput" class="input-box" rows="1" placeholder="تخيل أي شيء..." dir="auto"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendPrompt()">
                <svg id="sendIcon" width="22" height="22" viewBox="0 0 24 24" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                <span id="countdownEl" class="countdown-text" style="display:none;"></span>
            </button>
        </div>
    </div>

    <div id="galleryModal" class="modal-overlay">
        <div class="modal-header">
            <span style="font-weight:700; color:white;" id="txtGalleryTitle">معرض صوري</span>
            <button onclick="document.getElementById('galleryModal').style.display='none'" style="background:none; border:none; color:white; font-size:24px;">✕</button>
        </div>
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <div id="saveHelpModal" class="modal-overlay">
        <div class="modal-header">
            <span style="font-weight:700; color:white;">حفظ الصورة</span>
            <button onclick="document.getElementById('saveHelpModal').style.display='none'" style="background:none; border:none; color:white; font-size:24px;">✕</button>
        </div>
        <div class="save-help-content">
            <img id="saveHelpImg" class="save-help-img" src="">
            <div class="save-help-text" id="txtSaveHelp">
                اضغط مطولاً على الصورة أعلاه<br>ثم اختر "حفظ الصورة"
            </div>
            <button class="g-btn g-down" onclick="document.getElementById('saveHelpModal').style.display='none'" style="width:100%; max-width:200px; padding:12px;">تم / Done</button>
        </div>
    </div>

<script>
    // --- Config ---
    const MODELS = [
        { id: 'imagen-4', name: 'Nano Banana', desc: 'Creative & Balanced' },
        { id: 'gptimage', name: 'Chat GPT Image', desc: 'High Coherence' },
        { id: 'klein', name: 'FLUX.2 Klein 4B', desc: 'Fast & Detailed' },
        { id: 'klein-large', name: 'FLUX.2 Klein 9B', desc: 'Ultra Fidelity' }
    ];

    const RATIOS = [
        { id: 'square', label: '1:1', w: 1024, h: 1024, icon: '<rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>' },
        { id: 'portrait', label: '9:16', w: 768, h: 1344, icon: '<rect x="6" y="3" width="12" height="18" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>' },
        { id: 'landscape', label: '16:9', w: 1344, h: 768, icon: '<rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>' },
        { id: 'wide', label: '21:9', w: 1536, h: 640, icon: '<rect x="2" y="8" width="20" height="8" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>' }
    ];

    const TRANSLATIONS = {
        ar: {
            gallery: "معرضي",
            welcome: "أهلاً بك في AI Imagen <br> اختر الموديل واكتب ما تتخيله",
            placeholder: "تخيل أي شيء...",
            generating: "جاري الإنشاء...",
            download: "تحميل",
            delete: "حذف",
            error: "خطأ",
            galleryTitle: "معرض صوري",
            noImages: "لا توجد صور محفوظة.",
            confirmDel: "هل أنت متأكد من الحذف؟",
            wait: "انتظر",
            sec: "ث",
            noImage: "مفيش صورة للتحميل",
            saveHelp: "اضغط مطولاً على الصورة أعلاه<br>ثم اختر 'حفظ الصورة'"
        },
        en: {
            gallery: "My Gallery",
            welcome: "Welcome to AI Imagen <br> Select a model and imagine.",
            placeholder: "Imagine anything...",
            generating: "Generating...",
            download: "Download",
            delete: "Delete",
            error: "Error",
            galleryTitle: "My Gallery",
            noImages: "No saved images.",
            confirmDel: "Are you sure you want to delete?",
            wait: "Wait",
            sec: "s",
            noImage: "No image to download",
            saveHelp: "Long Press the image above<br>then select 'Save Image'"
        }
    };

    // --- State ---
    let currentLang = 'ar';
    let currentModel = MODELS[0].id;
    let currentWidth = 1024;
    let currentHeight = 1024;
    let currentRatioId = 'square';
    let piUser = null;
    let cooldownEndTime = 0;

    // --- Init ---
    const Pi = window.Pi;
    document.addEventListener('DOMContentLoaded', () => {
        try {
            Pi.init({ version: "2.0", sandbox: false }); 
        } catch (e) { console.error("Pi Init Error:", e); }
        
        renderModelMenu();
        renderAspectMenu();
        updateAspectUI();
        applyLanguage('ar'); 
    });

    // --- Language ---
    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.getElementById('langBtn').textContent = currentLang === 'ar' ? 'EN' : 'AR';
        applyLanguage(currentLang);
    }

    function applyLanguage(lang) {
        const t = TRANSLATIONS[lang];
        document.getElementById('txtGallery').textContent = t.gallery;
        document.getElementById('emptyMsg').innerHTML = t.welcome;
        document.getElementById('promptInput').placeholder = t.placeholder;
        document.getElementById('txtGalleryTitle').textContent = t.galleryTitle;
        document.getElementById('txtSaveHelp').innerHTML = t.saveHelp;
    }

    // --- Auth ---
    async function authenticatePi() {
        try {
            const scopes = ['username'];
            const auth = await Pi.authenticate(scopes, onIncompletePayment);
            if(auth.user) {
                piUser = auth.user;
                document.getElementById('landingPage').style.display = 'none';
                document.getElementById('piUserInfo').style.display = 'flex';
                document.getElementById('txtUsername').textContent = piUser.username;
            }
        } catch (err) {
            console.error(err);
            alert("Auth Failed. Please use Pi Browser.");
        }
    }
    function onIncompletePayment(payment) {}

    // --- UI Logic (Menus) ---
    function renderModelMenu() {
        const menu = document.getElementById('modelMenu');
        menu.innerHTML = '';
        MODELS.forEach(m => {
            const div = document.createElement('div');
            div.className = `menu-option ${m.id === currentModel ? 'active' : ''}`;
            div.onclick = () => selectModel(m);
            div.innerHTML = `
                <div>
                    <div style="font-weight:700; font-size:14px; color:white;">${m.name}</div>
                    <div style="font-size:11px; color:#888;">${m.desc}</div>
                </div>
                <svg width="20" height="20" viewBox="0 0 24 24" style="fill:var(--accent); opacity:${m.id === currentModel?1:0}"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            `;
            menu.appendChild(div);
        });
    }

    function selectModel(m) {
        currentModel = m.id;
        document.getElementById('headerModelName').textContent = m.name;
        toggleModelMenu();
        renderModelMenu();
    }

    function toggleModelMenu() {
        const menu = document.getElementById('modelMenu');
        const chevron = document.getElementById('modelChevron');
        const isHidden = menu.style.display === 'none' || menu.style.display === '';
        menu.style.display = isHidden ? 'flex' : 'none';
        chevron.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
        if(isHidden) document.getElementById('aspectMenu').style.display = 'none';
    }

    // --- Aspect Menu Logic (Fixed) ---
    function renderAspectMenu() {
        const menu = document.getElementById('aspectMenu');
        menu.innerHTML = '';
        RATIOS.forEach(r => {
            const div = document.createElement('div');
            div.className = `menu-option ${r.id === currentRatioId ? 'active' : ''}`;
            div.onclick = () => selectRatio(r);
            div.innerHTML = `
                <div style="display:flex; align-items:center; gap:10px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="color:white;">${r.icon}</svg>
                    <span style="font-size:13px; font-weight:600; color:white;">${r.label}</span>
                </div>
            `;
            menu.appendChild(div);
        });
    }

    function selectRatio(r) {
        currentWidth = r.w;
        currentHeight = r.h;
        currentRatioId = r.id;
        updateAspectUI();
        document.getElementById('aspectMenu').style.display = 'none'; // Close immediately
        renderAspectMenu(); // Update active state
    }

    function updateAspectUI() {
        const r = RATIOS.find(x => x.id === currentRatioId);
        document.getElementById('currentAspectLabel').textContent = r.label;
        document.getElementById('currentAspectIcon').innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none">${r.icon}</svg>`;
    }

    function toggleAspectMenu(e) {
        if(e) e.stopPropagation();
        const menu = document.getElementById('aspectMenu');
        const isHidden = menu.style.display === 'none' || menu.style.display === '';
        menu.style.display = isHidden ? 'flex' : 'none';
        if(isHidden) document.getElementById('modelMenu').style.display = 'none';
    }

    // --- Generation & Cooldown ---
    function updateCooldownUI() {
        const now = Date.now();
        const btn = document.getElementById('sendBtn');
        const icon = document.getElementById('sendIcon');
        const countEl = document.getElementById('countdownEl');
        const t = TRANSLATIONS[currentLang];

        if (now < cooldownEndTime) {
            const remaining = Math.ceil((cooldownEndTime - now) / 1000);
            btn.disabled = true;
            icon.style.display = 'none';
            countEl.style.display = 'block';
            countEl.innerText = `${t.wait}\n${remaining}${t.sec}`;
            requestAnimationFrame(updateCooldownUI);
        } else {
            btn.disabled = false;
            icon.style.display = 'block';
            countEl.style.display = 'none';
        }
    }

    function triggerCooldown(seconds) {
        cooldownEndTime = Date.now() + (seconds * 1000);
        updateCooldownUI();
    }

    async function sendPrompt() {
        if (Date.now() < cooldownEndTime) return;

        const input = document.getElementById('promptInput');
        const text = input.value.trim();
        const t = TRANSLATIONS[currentLang];
        
        if (!text || !piUser) return;

        addMessage(text, 'user');
        input.value = '';
        
        const loadingId = renderLoader(t.generating);
        triggerCooldown(5); 

        try {
            const response = await fetch('/.netlify/functions/generate-and-save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    prompt: text,
                    username: piUser.username,
                    uid: piUser.uid,
                    model: currentModel,
                    width: currentWidth,
                    height: currentHeight
                })
            });

            if (!response.ok) {
                triggerCooldown(20); 
                throw new Error('Server Error');
            }

            const data = await response.json();
            document.getElementById(loadingId).remove();
            
            if(data.imageUrl) {
                addBotImage(data.imageUrl);
            } else {
                addMessage(t.error, 'bot');
            }

        } catch (error) {
            document.getElementById(loadingId).innerHTML = `<div style="color:red; padding:10px;">${t.error}</div>`;
        }
    }

    // --- Visuals ---
    function renderLoader(text) {
        const div = document.createElement('div');
        div.className = 'message bot';
        div.id = 'loading-' + Date.now();
        div.innerHTML = `
            <div class="loading-box">
                <div class="blur-wave"></div>
                <div class="loading-text">${text}</div>
            </div>
        `;
        document.getElementById('chatContainer').appendChild(div);
        scrollToBottom();
        return div.id;
    }

    function addMessage(content, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerHTML = `<div class="msg-bubble">${content}</div>`;
        document.getElementById('chatContainer').appendChild(div);
        document.getElementById('emptyMsg').style.display = 'none';
        scrollToBottom();
    }

    function addBotImage(url) {
        const t = TRANSLATIONS[currentLang];
        const div = document.createElement('div');
        div.className = 'message bot';
        div.innerHTML = `
            <div class="msg-bubble">
                <img src="${url}" class="msg-image" onload="this.classList.add('loaded')">
                <div class="download-bar">
                    <button class="d-btn" onclick="forceDownload('${url}', this)">${t.download}</button>
                </div>
            </div>
        `;
        document.getElementById('chatContainer').appendChild(div);
        scrollToBottom();
    }

    function scrollToBottom() {
        const c = document.getElementById('chatContainer');
        c.scrollTop = c.scrollHeight;
    }

    // --- ULTRA ROBUST DOWNLOAD (Pi Browser Solution) ---
    async function forceDownload(url, btn) {
        if (!url) { alert(TRANSLATIONS[currentLang].noImage); return; }

        const originalText = btn.innerText;
        btn.innerText = "..."; 
        const filename = `AI_Image_${Date.now()}.png`; 

        try {
            // Attempt 1: Standard Fetch/Blob (Works on Desktop/Some Mobiles)
            const response = await fetch(url);
            if (!response.ok) throw new Error("Net error");
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            // Try to auto-click anchor
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            
            setTimeout(() => {
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
                btn.innerText = originalText;
            }, 500);

        } catch (e) {
            console.log("Auto-download failed. Trying Strategy 2...");
            
            // Strategy 2: Window Open (Sometimes works on Android WebViews)
            const newWin = window.open(url, '_blank');
            
            if(!newWin || newWin.closed || typeof newWin.closed=='undefined') {
                // Strategy 3: The "Long Press" Modal (Guaranteed Fallback)
                showSaveHelpModal(url);
            }
            btn.innerText = originalText;
        }
    }

    function showSaveHelpModal(url) {
        const modal = document.getElementById('saveHelpModal');
        const img = document.getElementById('saveHelpImg');
        img.src = url;
        modal.style.display = 'flex';
    }

    // --- Gallery ---
    async function openGallery() {
        const t = TRANSLATIONS[currentLang];
        if(!piUser) { alert("Login Required"); return; }
        
        const modal = document.getElementById('galleryModal');
        const grid = document.getElementById('galleryGrid');
        modal.style.display = 'flex';
        grid.innerHTML = '<div style="color:white; text-align:center; grid-column: span 2;">Loading...</div>';

        try {
            const res = await fetch(`/.netlify/functions/get-gallery?username=${piUser.username}`);
            const images = await res.json();
            grid.innerHTML = '';
            
            if(images.length === 0) {
                grid.innerHTML = `<div style="color:#777; padding:20px; grid-column: span 2; text-align:center;">${t.noImages}</div>`;
                return;
            }

            images.forEach(img => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `
                    <img src="${img.url}" loading="lazy">
                    <div class="gallery-actions">
                        <button class="g-btn g-down" onclick="forceDownload('${img.url}', this)">${t.download}</button>
                        <button class="g-btn g-del" onclick="deleteImage('${img.id}', this)">${t.delete}</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        } catch (e) { grid.innerHTML = `<div style="color:red; grid-column: span 2;">${t.error}</div>`; }
    }

    async function deleteImage(imageId, btn) {
        const t = TRANSLATIONS[currentLang];
        if(!confirm(t.confirmDel)) return;
        const parent = btn.closest('.gallery-item');
        parent.style.opacity = '0.5';
        try {
            const res = await fetch('/.netlify/functions/delete-image', {
                method: 'POST',
                body: JSON.stringify({ id: imageId, username: piUser.username })
            });
            if(res.ok) parent.remove();
            else { alert(t.error); parent.style.opacity = '1'; }
        } catch(e) { console.error(e); }
    }

    // Close on click outside
    document.addEventListener('click', (e) => {
        if(!e.target.closest('#modelMenu') && !e.target.closest('.header-title-area')) {
            document.getElementById('modelMenu').style.display = 'none';
            document.getElementById('modelChevron').style.transform = 'rotate(0deg)';
        }
        if(!e.target.closest('#aspectMenu') && !e.target.closest('#aspectTriggerBtn')) {
            document.getElementById('aspectMenu').style.display = 'none';
        }
    });
</script>
</body>
