<!DOCTYPE html>
<html lang="en" dir="ltr"> <head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"/>
<title>AIWay Suite</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* --- Design System --- */
:root {
    --bg: #050505;
    --chat-bg: #0a0a0a;
    --card: #141414;
    --sidebar: #111111;
    
    /* Brand Colors */
    --gradient-primary: linear-gradient(135deg, #7c3aed 0%, #f59e0b 100%);
    --gradient-text: linear-gradient(135deg, #a78bfa 0%, #fbbf24 100%);
    --accent-purple: #7c3aed;
    --accent-gold: #f59e0b;
    
    --text-main: #ffffff;
    --text-sub: #a1a1aa;
    --border: #27272a;
    
    /* Status Colors */
    --success: #10b981;
    --error: #ef4444;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

body {
    margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--chat-bg); color: var(--text-main);
    display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
}

/* --- Landing Page (Redesigned) --- */
.landing-overlay {
    position: fixed; inset: 0; background: #000; z-index: 9999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px; transition: opacity 0.5s ease;
    background: radial-gradient(circle at center, #1a0b2e 0%, #000000 100%);
}

.landing-lang-btn {
    position: absolute; top: 20px; right: 20px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
    color: white; padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer;
    font-weight: 600; z-index: 10; backdrop-filter: blur(10px);
}

.hero-title {
    font-size: 56px; font-weight: 900; margin-bottom: 10px;
    background: var(--gradient-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -2px; text-align: center;
}

.hero-subtitle {
    color: #888; font-size: 16px; margin-bottom: 40px; text-align: center; max-width: 400px; line-height: 1.5;
}

/* Feature Cards Grid */
.features-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
    width: 100%; max-width: 400px; margin-bottom: 40px;
}

.f-card {
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px; text-align: center;
    transition: 0.3s; cursor: default; position: relative; overflow: hidden;
}
.f-card:hover { border-color: var(--accent-purple); background: rgba(124, 58, 237, 0.05); }

.f-card.active { border-color: var(--accent-gold); }
.f-card.disabled { opacity: 0.5; border-style: dashed; }

.f-icon { font-size: 24px; margin-bottom: 10px; display: block; }
.f-title { font-weight: 700; font-size: 14px; color: #fff; }
.f-badge {
    position: absolute; top: 8px; right: 8px;
    font-size: 9px; background: #333; padding: 2px 6px; border-radius: 4px;
    color: #aaa;
}

.pi-login-btn {
    background: var(--gradient-primary); color: white; border: none;
    padding: 14px 60px; border-radius: 30px; font-weight: 800; font-size: 16px; cursor: pointer;
    box-shadow: 0 0 40px rgba(124, 58, 237, 0.3); display: flex; align-items: center; gap: 10px;
    transition: transform 0.2s;
}
.pi-login-btn:active { transform: scale(0.95); }
.pi-login-btn svg { width: 24px; height: 24px; fill: white; }

/* --- Header --- */
.header {
    padding: 0 16px; height: 60px; background: rgba(10, 10, 10, 0.9);
    backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 100;
}

.model-selector {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    padding: 6px 12px; border-radius: 12px; transition: 0.2s;
    background: rgba(255,255,255,0.03); border: 1px solid transparent;
}
.model-selector:active { background: rgba(255,255,255,0.08); }

.model-icon-box {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, #333, #111);
    display: flex; align-items: center; justify-content: center; font-size: 14px;
}

.header-actions { display: flex; gap: 8px; align-items: center; }

.token-badge {
    background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3);
    color: var(--accent-gold); padding: 4px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px;
}

/* --- Model Menu (Improved) --- */
.model-curtain {
    position: absolute; top: 60px; left: 0; right: 0;
    background: #0e0e0e; border-bottom: 1px solid var(--border);
    z-index: 90; display: none; flex-direction: column;
    max-height: 70vh; overflow-y: auto; padding: 10px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

.menu-section-title {
    font-size: 11px; color: var(--text-sub); margin: 10px 5px 5px 5px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
}

.menu-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px; border-radius: 10px; cursor: pointer;
    border: 1px solid transparent; margin-bottom: 4px;
}
.menu-item:hover { background: rgba(255,255,255,0.03); }
.menu-item.active {
    background: rgba(124, 58, 237, 0.1); border-color: var(--accent-purple);
}
.menu-item-info { display: flex; flex-direction: column; gap: 2px; }
.menu-item-name { font-weight: 700; font-size: 14px; color: #fff; }
.menu-item-cost { font-size: 11px; color: var(--accent-gold); }

/* --- Chat Area --- */
.chat-container {
    flex: 1; overflow-y: auto; padding: 20px 15px;
    display: flex; flex-direction: column; gap: 20px;
}

.message { display: flex; flex-direction: column; max-width: 92%; animation: fadeUp 0.3s ease; }
.message.user { align-self: flex-end; align-items: flex-end; }
.message.bot { align-self: flex-start; align-items: flex-start; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.msg-bubble {
    padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6;
    word-wrap: break-word; position: relative;
}

/* User Styling */
.message.user .msg-bubble {
    background: var(--gradient-primary); color: white;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 15px rgba(124, 58, 237, 0.2);
}

/* Bot Text Styling */
.message.bot.text .msg-bubble {
    background: #18181b; border: 1px solid var(--border); color: #e5e5e5;
    border-bottom-left-radius: 4px; width: 100%;
}
.message.bot.text .msg-bubble p { margin: 0 0 10px 0; }
.message.bot.text .msg-bubble pre { background: #000; padding: 10px; border-radius: 8px; overflow-x: auto; border: 1px solid #333; }
.message.bot.text .msg-bubble code { font-family: monospace; background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 4px; color: var(--accent-gold); }

/* Bot Media Styling (Image/Video) */
.message.bot.media .msg-bubble {
    padding: 0; background: transparent; border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden; max-width: 320px; width: 100%;
}
.media-wrapper { width: 100%; background: #000; display: flex; align-items: center; justify-content: center; min-height: 200px; }
.generated-media { width: 100%; height: auto; display: block; }

.dl-btn {
    width: 100%; padding: 12px; background: #1a1a1a; border: none; border-top: 1px solid #333;
    color: var(--accent-gold); font-weight: 700; cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
}
.dl-btn:active { background: #222; }

/* --- Input Area --- */
.input-area {
    padding: 12px; background: #050505; border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: flex-end; padding-bottom: max(12px, env(safe-area-inset-bottom));
}

.input-box {
    flex: 1; background: #141414; border: 1px solid var(--border); border-radius: 20px;
    padding: 12px 16px; color: white; font-size: 15px; max-height: 120px; resize: none;
}
.input-box:focus { border-color: var(--accent-purple); }

.send-btn {
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--gradient-primary); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: 0.2s;
}
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

/* --- Buy Tokens Modal (Improved) --- */
.buy-grid { display: flex; flex-direction: column; gap: 12px; padding: 20px; }
.buy-option {
    display: flex; justify-content: space-between; align-items: center;
    background: linear-gradient(135deg, #1a1a1a 0%, #111 100%);
    border: 1px solid var(--border); padding: 16px; border-radius: 12px;
    cursor: pointer; position: relative; overflow: hidden;
}
.buy-option:hover { border-color: var(--accent-gold); }
.buy-option::after {
    content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
    background: var(--accent-gold);
}
.buy-details { display: flex; flex-direction: column; }
.buy-tokens-amount { font-size: 18px; font-weight: 800; color: #fff; }
.buy-price { font-size: 12px; color: #888; }
.buy-pi-price { font-size: 14px; font-weight: 700; color: var(--accent-gold); }

/* --- Utilities --- */
.hidden { display: none !important; }
</style>
</head>
<body>

    <div id="landingPage" class="landing-overlay">
        <button class="landing-lang-btn" onclick="toggleLanguage()" id="landingLangBtn">AR</button>
        
        <div class="hero-title">AiWay</div>
        <div class="hero-subtitle" id="txtLandingDesc">Generate professional Images, Text, and Video using state-of-the-art AI.</div>
        
        <div class="features-grid">
            <div class="f-card active">
                <span class="f-icon">🖼️</span>
                <div class="f-title" id="cardImg">AI Images</div>
            </div>
            <div class="f-card active">
                <span class="f-icon">💬</span>
                <div class="f-title" id="cardTxt">AI Text</div>
            </div>
            <div class="f-card active">
                <span class="f-icon">🎬</span>
                <div class="f-title" id="cardVid">AI Video</div>
            </div>
            <div class="f-card disabled">
                <span class="f-badge">Soon</span>
                <span class="f-icon">🎵</span>
                <div class="f-title" id="cardAud">AI Audio</div>
            </div>
        </div>

        <button class="pi-login-btn" onclick="authenticatePi()">
            <svg viewBox="0 0 32 32"><path d="M16 32C7.163 32 0 24.837 0 16S7.163 0 16 0s16 7.163 16 16-7.163 16-16 16zm-2.5-22h-3v12h3V10zm8 0h-3v12h3V10z"/></svg>
            <span id="txtLogin">Pi Login</span>
        </button>
    </div>

    <div class="header">
        <div class="model-selector" onclick="toggleModelMenu()">
            <div class="model-icon-box" id="currentModelIcon">🖼️</div>
            <div>
                <div style="font-size:13px; font-weight:700;" id="headerModelName">Imagen 4</div>
                <div style="font-size:10px; color:#777;" id="headerModelType">Image Gen</div>
            </div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#666"><path d="M7 10l5 5 5-5z"/></svg>
        </div>
        
        <div class="header-actions">
            <button class="lang-btn" onclick="toggleLanguage()">EN</button>
            <div class="token-badge" onclick="openBuyModal()">
                <span id="tokenBalance">0</span> π
            </div>
        </div>
    </div>

    <div class="model-curtain" id="modelMenu"></div>

    <div class="chat-container" id="chatContainer">
        <div style="text-align:center; margin:auto; color:#333;">
            <div style="font-size:40px; margin-bottom:10px;">✨</div>
            <div id="emptyMsg">Select a model to start</div>
        </div>
    </div>

    <div class="input-area">
        <textarea id="promptInput" class="input-box" rows="1" placeholder="Type here..."></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendPrompt()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <div id="buyModal" class="landing-overlay hidden" style="background:rgba(0,0,0,0.9);">
        <div style="background:#141414; width:90%; max-width:400px; border-radius:20px; border:1px solid #333; overflow:hidden;">
            <div style="padding:15px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:700;" id="txtBuyTitle">Buy Tokens</span>
                <button onclick="document.getElementById('buyModal').classList.add('hidden')" style="background:none; border:none; color:#fff; font-size:20px;">✕</button>
            </div>
            <div class="buy-grid" id="buyGrid"></div>
        </div>
    </div>

<script>
    // --- Config ---
    const MODELS = [
        // Image
        { id: 'imagen-4', name: 'Imagen 4', type: 'image', cost: 1 },
        { id: 'klein', name: 'FLUX.2 Fast', type: 'image', cost: 2 },
        { id: 'gptimage', name: 'GPT Image', type: 'image', cost: 5 },
        // Video
        { id: 'grok-video', name: 'Grok Video', type: 'video', cost: 6 },
        // Chat
        { id: 'openai', name: 'GPT-5 Mini', type: 'chat', cost: 1 },
        { id: 'openai-large', name: 'GPT-5.2', type: 'chat', cost: 3 }
    ];

    const PACKAGES = [ 
        { usd: 1, tokens: 150 }, 
        { usd: 5, tokens: 750 }, 
        { usd: 10, tokens: 1500 } 
    ];

    const TRANSLATIONS = {
        en: {
            welcome: "Select a model to start", placeholder: "Type here...",
            login: "Pi Login", buyTitle: "Buy Tokens",
            cardImg: "AI Images", cardTxt: "AI Text", cardVid: "AI Video", cardAud: "AI Audio (Soon)",
            typeImg: "Image Gen", typeVid: "Video Gen", typeChat: "Chat Bot",
            download: "Download", copy: "Copy Text",
            error: "Error", rateLimit: "High traffic! Wait 25s..."
        },
        ar: {
            welcome: "اختر موديل للبدء", placeholder: "اكتب هنا...",
            login: "تسجيل دخول", buyTitle: "شراء توكين",
            cardImg: "صور ذكاء", cardTxt: "شات ومحادثة", cardVid: "فيديو ذكاء", cardAud: "صوتيات (قريباً)",
            typeImg: "توليد صور", typeVid: "توليد فيديو", typeChat: "محادثة",
            download: "تحميل", copy: "نسخ النص",
            error: "خطأ", rateLimit: "ضغط عالي! انتظر 25 ثانية..."
        }
    };

    // State
    let currentLang = 'en';
    let currentModelId = 'imagen-4';
    let piUser = null;
    let currentPiPrice = 40.0;
    let cooldownEndTime = 0;

    const Pi = window.Pi;

    // --- Init ---
    document.addEventListener('DOMContentLoaded', () => {
        try { Pi.init({ version: "2.0", sandbox: false }); } catch(e){}
        renderModelMenu();
        applyLanguage('en');
        fetchPiPrice();
    });

    // --- Core Functions ---
    function selectModel(id) {
        currentModelId = id;
        const m = MODELS.find(x => x.id === id);
        document.getElementById('headerModelName').innerText = m.name;
        document.getElementById('headerModelType').innerText = getTypeText(m.type);
        document.getElementById('currentModelIcon').innerText = m.type === 'chat' ? '💬' : (m.type === 'video' ? '🎬' : '🖼️');
        document.getElementById('modelMenu').style.display = 'none';
    }

    function getTypeText(type) {
        const t = TRANSLATIONS[currentLang];
        if(type === 'chat') return t.typeChat;
        if(type === 'video') return t.typeVid;
        return t.typeImg;
    }

    function toggleModelMenu() {
        const menu = document.getElementById('modelMenu');
        menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    }

    function renderModelMenu() {
        const menu = document.getElementById('modelMenu');
        menu.innerHTML = '';
        
        const types = ['image', 'video', 'chat'];
        types.forEach(type => {
            const sectionTitle = document.createElement('div');
            sectionTitle.className = 'menu-section-title';
            sectionTitle.innerText = type.toUpperCase();
            menu.appendChild(sectionTitle);

            MODELS.filter(m => m.type === type).forEach(m => {
                const div = document.createElement('div');
                div.className = 'menu-item';
                div.onclick = () => selectModel(m.id);
                div.innerHTML = `
                    <div class="menu-item-info">
                        <span class="menu-item-name">${m.name}</span>
                        <span class="menu-item-cost" style="color:${type==='video'?'#f43f5e':(type==='chat'?'#3b82f6':'#f59e0b')}">${m.cost} Tokens</span>
                    </div>
                    <div style="font-size:18px;">${type==='chat'?'💬':(type==='video'?'🎬':'🖼️')}</div>
                `;
                menu.appendChild(div);
            });
        });
    }

    // --- Send Logic ---
    async function sendPrompt() {
        if(Date.now() < cooldownEndTime) return;
        const text = document.getElementById('promptInput').value.trim();
        if(!text) return;
        if(!piUser) { alert("Please Login"); return; }

        // UI Updates
        const chat = document.getElementById('chatContainer');
        document.getElementById('emptyMsg').parentElement.style.display = 'none';
        
        // Add User Message
        const userDiv = document.createElement('div');
        userDiv.className = 'message user';
        userDiv.innerHTML = `<div class="msg-bubble">${text}</div>`;
        chat.appendChild(userDiv);
        
        document.getElementById('promptInput').value = '';
        chat.scrollTop = chat.scrollHeight;

        // Loader
        const loaderDiv = document.createElement('div');
        loaderDiv.className = 'message bot';
        loaderDiv.innerHTML = `<div class="msg-bubble" style="color:#888;">${TRANSLATIONS[currentLang].generating}</div>`;
        chat.appendChild(loaderDiv);

        try {
            const m = MODELS.find(x => x.id === currentModelId);
            
            // Call Backend
            const res = await fetch('/.netlify/functions/generate-and-save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    prompt: text,
                    username: piUser.username,
                    pi_uid: piUser.uid,
                    model: m.id
                })
            });

            if(res.status === 403) throw new Error("No Tokens");
            if(!res.ok) throw new Error("Server Error");

            const data = await res.json();
            
            // Remove Loader
            loaderDiv.remove();
            
            // Update Balance
            if(data.newBalance !== undefined) document.getElementById('tokenBalance').innerText = data.newBalance;

            // Render Result based on Type
            if(data.result.type === 'text') {
                renderBotText(data.result.content);
            } else if(data.result.type === 'video') {
                renderBotVideo(data.result.url);
            } else {
                renderBotImage(data.result.url);
            }

        } catch (err) {
            loaderDiv.innerHTML = `<div class="msg-bubble" style="color:var(--error);">${TRANSLATIONS[currentLang].rateLimit}</div>`;
            cooldownEndTime = Date.now() + 25000;
            updateCooldownBtn();
        }
    }

    function renderBotText(text) {
        const div = document.createElement('div');
        div.className = 'message bot text';
        // Parse Markdown using marked lib
        div.innerHTML = `<div class="msg-bubble">${marked.parse(text)}</div>`;
        document.getElementById('chatContainer').appendChild(div);
        scrollToBottom();
    }

    function renderBotVideo(url) {
        const div = document.createElement('div');
        div.className = 'message bot media';
        div.innerHTML = `
            <div class="msg-bubble">
                <div class="media-wrapper">
                    <video src="${url}" controls class="generated-media"></video>
                </div>
                <button class="dl-btn" onclick="downloadMedia('${url}')">
                    ⬇ ${TRANSLATIONS[currentLang].download}
                </button>
            </div>`;
        document.getElementById('chatContainer').appendChild(div);
        scrollToBottom();
    }

    function renderBotImage(url) {
        const div = document.createElement('div');
        div.className = 'message bot media';
        div.innerHTML = `
            <div class="msg-bubble">
                <div class="media-wrapper">
                    <img src="${url}" class="generated-media" onload="this.style.opacity=1">
                </div>
                <button class="dl-btn" onclick="downloadMedia('${url}')">
                    ⬇ ${TRANSLATIONS[currentLang].download}
                </button>
            </div>`;
        document.getElementById('chatContainer').appendChild(div);
        scrollToBottom();
    }

    function downloadMedia(url) {
        window.open(url + "?download=", '_blank');
    }

    function scrollToBottom() {
        const c = document.getElementById('chatContainer');
        c.scrollTop = c.scrollHeight;
    }

    function updateCooldownBtn() {
        const btn = document.getElementById('sendBtn');
        const interval = setInterval(() => {
            const left = Math.ceil((cooldownEndTime - Date.now()) / 1000);
            if(left <= 0) {
                btn.disabled = false;
                btn.innerHTML = `<svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>`;
                clearInterval(interval);
            } else {
                btn.disabled = true;
                btn.innerText = left;
            }
        }, 1000);
    }

    // --- Other logic (Auth, Price, Lang) ---
    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'ar' : 'en';
        document.getElementById('landingLangBtn').innerText = currentLang.toUpperCase();
        applyLanguage(currentLang);
    }

    function applyLanguage(lang) {
        const t = TRANSLATIONS[lang];
        document.getElementById('txtLandingDesc').innerText = t.desc;
        document.getElementById('txtLogin').innerText = t.login;
        document.getElementById('cardImg').innerText = t.cardImg;
        document.getElementById('cardTxt').innerText = t.cardTxt;
        document.getElementById('cardVid').innerText = t.cardVid;
        document.getElementById('cardAud').innerText = t.cardAud;
        document.getElementById('txtBuyTitle').innerText = t.buyTitle;
        document.getElementById('emptyMsg').innerText = t.welcome;
        document.getElementById('promptInput').placeholder = t.placeholder;
        renderModelMenu(); // Re-render menu to translate types
    }

    async function fetchPiPrice() {
        try {
            const res = await fetch('/.netlify/functions/get-pi-price');
            const data = await res.json();
            if(data.price) currentPiPrice = data.price;
        } catch(e){}
    }

    function openBuyModal() {
        const grid = document.getElementById('buyGrid');
        grid.innerHTML = '';
        PACKAGES.forEach(pkg => {
            const piVal = (pkg.usd / currentPiPrice).toFixed(4);
            const div = document.createElement('div');
            div.className = 'buy-option';
            div.onclick = () => buyTokens(pkg, piVal);
            div.innerHTML = `
                <div class="buy-details">
                    <span class="buy-tokens-amount">${pkg.tokens} Tokens</span>
                    <span class="buy-price">$${pkg.usd} USD</span>
                </div>
                <span class="buy-pi-price">${piVal} π</span>
            `;
            grid.appendChild(div);
        });
        document.getElementById('buyModal').classList.remove('hidden');
    }

    async function authenticatePi() {
        try {
            const scopes = ['username', 'payments'];
            const auth = await Pi.authenticate(scopes, onIncompletePayment);
            if(auth.user) {
                piUser = auth.user;
                document.getElementById('landingPage').style.display = 'none';
                fetchBalance();
            }
        } catch (err) { alert("Auth Failed"); }
    }
    function onIncompletePayment(payment) {} 

    async function fetchBalance() {
        if(!piUser) return;
        const res = await fetch(`/.netlify/functions/get-balance?uid=${piUser.uid}`);
        const data = await res.json();
        document.getElementById('tokenBalance').innerText = data.balance || 0;
    }

    async function buyTokens(pkg, piVal) {
        // ... (Same logic as before, just triggering payment)
        if (!piUser) { alert("Login first"); return; }
        try {
            const paymentData = {
                amount: parseFloat(piVal),
                memo: `${pkg.tokens} Tokens`,
                metadata: { type: "tokens", tokenAmount: pkg.tokens, pi_uid: piUser.uid }
            };
            await Pi.createPayment(paymentData, {
                onReadyForServerApproval: async (pid) => {
                    await fetch('/.netlify/functions/approve', { method: 'POST', body: JSON.stringify({ paymentId: pid }) });
                },
                onReadyForServerCompletion: async (pid, txid) => {
                    const res = await fetch('/.netlify/functions/complete', {
                        method: 'POST',
                        body: JSON.stringify({ paymentId: pid, txid, pi_uid: piUser.uid, tokenAmount: pkg.tokens, usdAmount: pkg.usd, pAmount: piVal, username: piUser.username })
                    });
                    const d = await res.json();
                    document.getElementById('tokenBalance').innerText = d.newBalance;
                    document.getElementById('buyModal').classList.add('hidden');
                    alert("Success!");
                },
                onCancel: () => {},
                onError: (e) => { alert(e); }
            });
        } catch(e) { alert("Payment Error"); }
    }
</script>
</body>
</html>
