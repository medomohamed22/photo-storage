<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"/>
<title>AIWay</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* --- Design System & New Colors --- */
:root {
    --bg: #050505; 
    --chat-bg: #000000;
    --card: #121212;
    --primary-gradient: linear-gradient(135deg, #8b5cf6 0%, #f59e0b 100%);
    --text-gradient: linear-gradient(135deg, #a78bfa 0%, #fbbf24 100%);
    --pi-purple: #7c3aed;
    --pi-gold: #f59e0b;
    --text-main: #ffffff;
    --text-sub: #a1a1aa;
    --border: #27272a;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--chat-bg); color: var(--text-main);
    display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
    direction: rtl; 
}

/* --- Landing Page --- */
.landing-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at center, #1a0b2e 0%, #000000 100%);
    z-index: 9999; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 20px; text-align: center;
    transition: opacity 0.5s ease;
}
.landing-lang-btn {
    position: absolute; top: 20px; right: 20px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;
    font-weight: 700; z-index: 10; backdrop-filter: blur(10px);
}
.landing-logo-text {
    font-size: 64px; font-weight: 900; margin-bottom: 10px;
    background: var(--text-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 25px rgba(124, 58, 237, 0.4)); letter-spacing: -2px;
}
.landing-desc { color: #ccc; margin-bottom: 40px; font-size: 15px; line-height: 1.6; max-width: 300px; }
.features-title { font-size: 14px; color: var(--pi-gold); margin-bottom: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.features-container { display: flex; gap: 15px; justify-content: center; margin-bottom: 50px; }
.feature-btn {
    padding: 12px 24px; border-radius: 12px; font-weight: 700; font-size: 14px;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    border: none; cursor: default; position: relative; min-width: 110px;
}
.f-images { background: var(--primary-gradient); color: white; box-shadow: 0 0 20px rgba(245, 158, 11, 0.3); }
.f-video { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.1); }
.pi-login-btn {
    background: var(--primary-gradient); color: white; border: none;
    padding: 14px 50px; border-radius: 30px; font-weight: 800; font-size: 16px; cursor: pointer;
    box-shadow: 0 0 30px rgba(124, 58, 237, 0.4); display: flex; align-items: center; gap: 10px;
    transition: transform 0.2s;
}
.pi-login-btn:active { transform: scale(0.95); }
.pi-login-btn svg { width: 24px; height: 24px; fill: white; }

/* --- Header --- */
.header {
    padding: 10px 16px; background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
    height: 60px; flex-shrink: 0; z-index: 100;
}
.header-title-area {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    padding: 4px 8px; border-radius: 12px; transition: 0.2s;
}
.header-title-area:active { background: rgba(255,255,255,0.05); }
.header-cost-badge {
    background: var(--pi-gold); color: #000; font-size: 11px; font-weight: 800;
    width: auto; min-width: 20px; padding: 0 4px; height: 20px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; margin-right: 5px; 
}
.header-left { display: flex; gap: 8px; align-items: center; }
.token-btn {
    background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3);
    color: var(--pi-gold); padding: 0 12px; height: 34px; border-radius: 18px;
    font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px;
}
.token-icon { width: 14px; height: 14px; fill: currentColor; }
.lang-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text-main); padding: 0 12px; height: 34px; border-radius: 18px;
    font-size: 11px; font-weight: 600; cursor: pointer;
}

/* --- Chat & Content --- */
.chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 20px; }
.message { display: flex; flex-direction: column; max-width: 90%; animation: slideUp 0.3s ease; }
.message.user { align-self: flex-end; } 
.message.bot { align-self: flex-start; }

.msg-bubble {
    padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5;
    word-wrap: break-word; display: flex; flex-direction: column; 
}
.message.user .msg-bubble { 
    background: linear-gradient(135deg, #4c1d95 0%, #2e1065 100%);
    color: #fff; border: 1px solid rgba(124, 58, 237, 0.3); border-bottom-left-radius: 4px; 
}
.message.bot .msg-bubble {
    background: transparent; padding: 0; border: 1px solid var(--border);
    border-radius: 20px; overflow: hidden; width: 100%; max-width: 320px;
}
/* Chat Specific Bubble */
.message.bot.text-mode .msg-bubble {
    background: #18181b; padding: 12px 16px; width: auto; max-width: 90%;
}
.markdown-content p { margin: 0 0 8px 0; }
.markdown-content pre { background: #000; padding: 10px; border-radius: 8px; overflow-x: auto; border: 1px solid #333; }
.markdown-content code { font-family: monospace; color: #f59e0b; }

/* Image & Video Containers */
.media-container { position: relative; width: 100%; min-height: 280px; background: #000; display: flex; align-items: center; justify-content: center;}
.msg-image, .msg-video { width: 100%; height: auto; display: block; opacity: 0; transition: opacity 0.8s ease-in; }
.msg-image.loaded, .msg-video.loaded { opacity: 1; }

.loading-box {
    width: 280px; aspect-ratio: 1/1; border-radius: 20px; position: relative; overflow: hidden;
    background: #000; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap:10px;
}
.blur-wave {
    position: absolute; inset: -50%;
    background: conic-gradient(from 0deg, transparent 0deg, var(--pi-purple) 100deg, transparent 180deg, var(--pi-gold) 260deg, transparent 360deg);
    filter: blur(40px); opacity: 0.5; animation: rotateWave 4s linear infinite;
}
.loading-text {
    position: relative; z-index: 2; font-weight: 700; font-size: 13px; color: white;
    background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 30px;
    backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
    animation: pulse 1.5s ease-in-out infinite;
}
.video-timer {
    position: relative; z-index: 2; font-family: monospace; font-size: 16px; 
    color: var(--pi-gold); font-weight: bold; background: rgba(0,0,0,0.8);
    padding: 4px 10px; border-radius: 8px;
}

.download-bar { padding: 12px; background: #141414; display: flex; justify-content: center; border-top: 1px solid #222; width: 100%; }
.d-btn { background: var(--pi-gold); color: black; border: none; padding: 10px 0; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; width: 100%; }

/* --- Footer --- */
.footer-container { background: #050505; border-top: 1px solid var(--border); padding-bottom: max(10px, env(safe-area-inset-bottom)); z-index: 100; position: relative; }
.control-bar { display: flex; gap: 10px; padding: 8px 12px 0 12px; }
.footer-btn {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 6px 12px; color: var(--text-sub); font-size: 12px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
}
.input-row { display: flex; gap: 8px; padding: 10px 12px; align-items: flex-end; }
.input-box { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 14px 18px; color: white; outline: none; resize: none; max-height: 120px; font-size: 15px; }
.send-btn { 
    width: 48px; height: 48px; border-radius: 50%; background: var(--primary-gradient);
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px; color: white;
}
.send-btn:disabled { background: #333; cursor: not-allowed; }

/* --- Menus & Modals (Standardized) --- */
.model-menu, .aspect-menu-dropdown {
    background: rgba(18, 18, 18, 0.98); backdrop-filter: blur(20px); border: 1px solid var(--border);
    border-radius: 16px; display: none; flex-direction: column; gap: 5px; position: absolute; z-index: 90;
}
.model-menu { top: 60px; left: 0; right: 0; padding: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
.aspect-menu-dropdown { bottom: 100%; right: 12px; width: 200px; padding: 8px; margin-bottom: 8px; }

.menu-option {
    display: flex; justify-content: space-between; align-items: center; padding: 12px;
    background: rgba(255,255,255,0.03); border-radius: 10px; cursor: pointer; border: 1px solid transparent;
}
.menu-option.active { border-color: var(--pi-purple); background: rgba(124, 58, 237, 0.1); }
.cost-badge-menu { background: rgba(255,255,255,0.1); color: var(--pi-gold); font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 700; }

.modal-overlay { 
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 500; 
    display: none; flex-direction: column; justify-content: center; align-items: center;
}
.modal-window { width: 90%; max-width: 400px; background: #111; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
.modal-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #18181b; font-weight: 700; }
.buy-grid { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.buy-card {
    background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 15px;
    border-radius: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer;
}

/* Animations */
@keyframes rotateWave { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes pulse { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

/* No Token Card */
.no-token-card { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 20px; padding: 20px; text-align: center; }
.buy-now-btn { background: var(--pi-gold); color: black; border: none; padding: 8px 24px; border-radius: 20px; font-weight: 700; margin-top: 10px; cursor: pointer; }

/* Download Help */
.dl-copy-box { background: rgba(255,255,255,0.1); border: 1px dashed #555; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; color: var(--pi-gold); width: 100%; text-align: center; margin-bottom: 15px; word-break: break-all; }
.g-down { background: var(--pi-gold); color: black; border: 1px solid var(--pi-gold); padding: 8px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }

/* Gallery */
.gallery-grid { padding: 12px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-height: 60vh; overflow-y: auto; }
.gallery-item { position: relative; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 1/1; }
.gallery-item img { width: 100%; height: 100%; object-fit: cover; }
.gallery-actions { position: absolute; bottom: 0; left: 0; right: 0; padding: 5px; background: rgba(0,0,0,0.7); display: flex; gap: 5px; }
.g-btn { flex: 1; border: none; padding: 5px; font-size: 10px; cursor: pointer; border-radius: 4px; color: white; }
.g-del { background: #ef4444; } .g-dl { background: var(--pi-gold); color: black; }

</style>
</head>
<body>

    <div id="landingPage" class="landing-overlay">
        <button class="landing-lang-btn" onclick="toggleLanguage()" id="landingLangBtn">AR</button>
        <div class="landing-logo-text">AiWay</div>
        <div class="landing-desc" id="txtLandingDesc">Generate professional images using state-of-the-art AI technologies</div>
        <div class="features-title" id="txtFeaturesTitle">Site Supports</div>
        <div class="features-container">
            <button class="feature-btn f-images"><span>Ai Images</span></button>
            <button class="feature-btn f-images" style="background: linear-gradient(135deg, #f43f5e 0%, #fbbf24 100%);"><span>Ai Video</span></button>
            <button class="feature-btn f-images" style="background: linear-gradient(135deg, #3b82f6 0%, #2dd4bf 100%);"><span>Ai Chat</span></button>
        </div>
        <button class="pi-login-btn" onclick="authenticatePi()">
            <svg viewBox="0 0 32 32"><path d="M16 32C7.163 32 0 24.837 0 16S7.163 0 16 0s16 7.163 16 16-7.163 16-16 16zm-2.5-22h-3v12h3V10zm8 0h-3v12h3V10z"/></svg>
            <span id="txtLogin">Pi Login</span>
        </button>
    </div>

    <div class="header">
        <div class="header-title-area" onclick="toggleModelMenu()">
            <div style="font-weight:700; font-size:16px; display:flex; align-items:center;" id="headerModelName">
                Imagen 4
            </div>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#777" id="modelChevron" style="transition:0.3s; margin-inline-start:5px;"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        </div>
        <div class="header-left">
            <button class="lang-btn" onclick="toggleLanguage()" id="langBtn">AR</button>
            <button class="token-btn" onclick="openBuyModal()">
                <svg class="token-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.67v-1.93c-1.71-.36-3.16-1.46-3.27-3.4h1.96c.1 1.05 1.18 1.91 2.53 1.91 1.38 0 2.53-.83 2.53-1.94 0-.85-.38-1.55-2.03-1.95l-1.04-.25c-2.31-.55-3.62-1.89-3.62-3.63 0-1.86 1.34-3.2 3.14-3.56V4h2.67v1.9c1.68.39 2.92 1.43 3.08 3.13h-2.01c-.13-.88-.95-1.57-2.19-1.57-1.32 0-2.19.85-2.19 1.83 0 .74.43 1.35 2.17 1.77l.82.2c2.51.6 3.84 1.95 3.84 3.73 0 1.96-1.5 3.33-3.22 3.66z"/></svg>
                <span id="tokenBalance">0</span> π
            </button>
        </div>
    </div>

    <div class="model-menu" id="modelMenu"></div>

    <div class="chat-container" id="chatContainer">
        <div style="text-align:center; color:#555; margin-top:50px;" id="emptyMsg">
            Welcome to AIWay
        </div>
    </div>

    <div class="footer-container">
        <div class="control-bar">
            <button class="footer-btn" onclick="openGallery()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22 16V4c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2zm-11-4l2.03 2.71L16 11l4 5H8l3-4z"/></svg>
                <span id="txtGallery">Gallery</span>
            </button>
            <div class="aspect-menu-dropdown" id="aspectMenu"></div>
            <button class="footer-btn" id="aspectTriggerBtn" onclick="toggleAspectMenu(event)">
                <div style="display:flex; align-items:center; gap:8px;">
                    <span id="currentAspectIcon"></span>
                    <span id="currentAspectLabel">1:1</span>
                </div>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="#777"><path d="M7 10l5 5 5-5z"/></svg>
            </button>
        </div>
        <div class="input-row">
            <textarea id="promptInput" class="input-box" rows="1" placeholder="Imagine anything..." dir="auto"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendPrompt()">
                <svg id="sendIcon" width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                <span id="countdownEl" class="countdown-text" style="display:none;"></span>
            </button>
        </div>
    </div>

    <div id="galleryModal" class="modal-overlay">
        <div class="modal-window" style="height:80%;">
            <div class="modal-header">
                <span id="txtGalleryTitle">My Gallery</span>
                <button onclick="document.getElementById('galleryModal').style.display='none'" style="background:none; border:none; color:white; font-size:24px;">✕</button>
            </div>
            <div class="gallery-grid" id="galleryGrid"></div>
        </div>
    </div>

    <div id="buyModal" class="modal-overlay">
        <div class="modal-window">
            <div class="modal-header">
                <span id="txtBuyTitle">Buy Tokens</span>
                <button onclick="document.getElementById('buyModal').style.display='none'" style="background:none; border:none; color:white; font-size:24px;">✕</button>
            </div>
            <div class="buy-grid" id="buyGrid"></div>
        </div>

    <div id="downloadInfoModal" class="modal-overlay">
        <div class="modal-window" style="padding:20px; align-items:center;">
            <div style="font-size:40px; margin-bottom:10px;">📋</div>
            <div style="font-size:18px; font-weight:700; margin-bottom:10px; color:var(--pi-gold);" id="txtDlTitle">Link Copied!</div>
            <div style="color:#ccc; text-align:center; font-size:14px; margin-bottom:20px;" id="txtDlDesc"></div>
            <div class="dl-copy-box" id="dlLinkBox"></div>
            <button class="g-down" onclick="document.getElementById('downloadInfoModal').style.display='none'">OK</button>
        </div>
    </div>

<script>
    // --- Configuration & Models ---
    const MODELS = [
        // Images
        { id: 'imagen-4', name: 'Imagen 4', desc: 'Powered by Google', cost: 1, type: 'image' },
        { id: 'gptimage', name: 'Chat GPT Image', desc: 'High Quality', cost: 5, type: 'image' },
        { id: 'klein', name: 'FLUX.2 Klein 4B', desc: 'Fast', cost: 2, type: 'image' },
        { id: 'klein-large', name: 'FLUX.2 Klein 9B', desc: 'Detailed', cost: 4, type: 'image' },
        // Video
        { id: 'grok-video', name: 'Grok Video', desc: 'Generate Video', cost: 6, type: 'video' },
        // Chat
        { id: 'openai-large', name: 'OpenAI GPT-5.2', desc: 'Smartest (3 Tokens)', cost: 3, type: 'chat' },
        { id: 'openai', name: 'OpenAI GPT-5 Mini', desc: 'Balanced (0.5 Tokens)', cost: 0.5, type: 'chat' },
        { id: 'openai-fast', name: 'OpenAI GPT-5 Nano', desc: 'Fastest (0.5 Tokens)', cost: 0.5, type: 'chat' }
    ];

    const RATIOS = [
        { id: 'square', label: '1:1', w: 1024, h: 1024, icon: '<rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>' },
        { id: 'portrait', label: '9:16', w: 768, h: 1344, icon: '<rect x="6" y="3" width="12" height="18" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>' },
        { id: 'landscape', label: '16:9', w: 1344, h: 768, icon: '<rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>' }
    ];

    const PACKAGES = [ { usd: 1, tokens: 150 }, { usd: 5, tokens: 750 }, { usd: 10, tokens: 1500 } ];

    const TRANSLATIONS = {
        ar: {
            gallery: "معرضي", welcome: "أهلاً بك في AIWay", placeholder: "اكتب هنا...", generating: "جاري الإنشاء...", 
            genVideo: "إنشاء فيديو", download: "تحميل", delete: "حذف", error: "خطأ", galleryTitle: "معرض صوري", buyTitle: "شراء توكين",
            noImages: "لا توجد وسائط محفوظة.", confirmDel: "هل أنت متأكد؟", wait: "انتظر", sec: "ث", noTokens: "رصيد التوكين نفذ 😢", 
            buyNow: "شراء الآن", cost: "توكين", desc: "توليد صور وفيديو وشات باستخدام الذكاء الاصطناعي", login: "Pi Login", 
            features: "الموقع يدعم", soon: "قريباً", dlTitle: "تم نسخ الرابط! 📋", dlDesc: "الصق الرابط في متصفح خارجي للتحميل.",
            rateLimit: "ضغط عالي! انتظر قليلاً...", videoCreating: "يتم إنشاء الفيديو"
        },
        en: {
            gallery: "Gallery", welcome: "Welcome to AIWay", placeholder: "Type here...", generating: "Generating...", 
            genVideo: "Creating Video", download: "Download", delete: "Delete", error: "Error", galleryTitle: "My Gallery", buyTitle: "Buy Tokens",
            noImages: "No saved media.", confirmDel: "Are you sure?", wait: "Wait", sec: "s", noTokens: "Out of Tokens 😢", 
            buyNow: "Buy Now", cost: "Tokens", desc: "Generate Image, Video & Chat with AI", login: "Pi Login", 
            features: "Site Supports", soon: "Soon", dlTitle: "Link Copied! 📋", dlDesc: "Paste link in external browser to download.",
            rateLimit: "High traffic! Wait...", videoCreating: "Creating Video"
        }
    };

    let currentLang = 'en'; 
    let currentModel = MODELS[0];
    let currentWidth = 1024;
    let currentHeight = 1024;
    let piUser = null;
    let cooldownEndTime = 0;
    let currentPiPrice = 40.0;
    let videoTimerInterval = null;

    const Pi = window.Pi;
    document.addEventListener('DOMContentLoaded', () => {
        try { Pi.init({ version: "2.0", sandbox: false }); } catch (e) {}
        selectModel(MODELS[0]);
        renderAspectMenu();
        applyLanguage('en');
        fetchPiPrice();
        setInterval(fetchPiPrice, 10000);
    });

    async function fetchPiPrice() {
        try {
            const res = await fetch('/.netlify/functions/get-pi-price');
            const data = await res.json();
            if(data.price) currentPiPrice = data.price;
        } catch(e) {}
    }

    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        const label = currentLang === 'ar' ? 'EN' : 'AR';
        document.getElementById('langBtn').textContent = label;
        document.getElementById('landingLangBtn').textContent = label;
        applyLanguage(currentLang);
    }

    function applyLanguage(lang) {
        const t = TRANSLATIONS[lang];
        document.getElementById('txtGallery').textContent = t.gallery;
        document.getElementById('emptyMsg').innerHTML = t.welcome;
        document.getElementById('promptInput').placeholder = t.placeholder;
        document.getElementById('txtGalleryTitle').textContent = t.galleryTitle;
        document.getElementById('txtBuyTitle').textContent = t.buyTitle;
        document.getElementById('txtLandingDesc').textContent = t.desc;
        document.getElementById('txtLogin').textContent = t.login;
        document.getElementById('txtFeaturesTitle').textContent = t.features;
        document.getElementById('txtDlTitle').textContent = t.dlTitle;
        document.getElementById('txtDlDesc').innerHTML = t.dlDesc;
        renderModelMenu();
        renderBuyGrid();
    }

    async function authenticatePi() {
        try {
            const auth = await Pi.authenticate(['username', 'payments'], onIncompletePayment);
            if(auth.user) {
                piUser = auth.user;
                document.getElementById('landingPage').style.display = 'none';
                fetchBalance();
            }
        } catch (err) { alert("Auth Failed"); }
    }
    function onIncompletePayment(payment) {}

    async function fetchBalance() {
        if (!piUser) return;
        try {
            const res = await fetch(`/.netlify/functions/get-balance?uid=${piUser.uid}`);
            const data = await res.json();
            document.getElementById('tokenBalance').textContent = data.balance || 0;
        } catch (e) {}
    }

    function renderModelMenu() {
        const menu = document.getElementById('modelMenu');
        menu.innerHTML = '';
        const t = TRANSLATIONS[currentLang];
        
        // Grouping
        const types = ['image', 'video', 'chat'];
        types.forEach(type => {
            const header = document.createElement('div');
            header.style.color = '#777'; header.style.fontSize = '12px'; header.style.margin = '5px 0';
            header.textContent = type.toUpperCase();
            menu.appendChild(header);
            
            MODELS.filter(m => m.type === type).forEach(m => {
                const div = document.createElement('div');
                div.className = `menu-option ${m.id === currentModel.id ? 'active' : ''}`;
                div.onclick = () => selectModel(m);
                div.innerHTML = `
                    <div>
                        <div style="font-weight:700; font-size:14px; color:white; display:flex; align-items:center; gap:8px;">
                            ${m.name}
                            <span class="cost-badge-menu">${m.cost} ${t.cost}</span>
                        </div>
                        <div style="font-size:11px; color:#888;">${m.desc}</div>
                    </div>
                    <svg width="20" height="20" viewBox="0 0 24 24" style="fill:var(--pi-purple); opacity:${m.id === currentModel.id?1:0}"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                `;
                menu.appendChild(div);
            });
        });
    }

    function selectModel(m) {
        currentModel = m;
        const badge = `<span class="header-cost-badge">${m.cost}</span>`;
        document.getElementById('headerModelName').innerHTML = `${m.name} ${badge}`;
        document.getElementById('modelMenu').style.display = 'none';
        
        // Hide Aspect Menu button if Chat
        const aspectBtn = document.getElementById('aspectTriggerBtn');
        if (m.type === 'chat') aspectBtn.style.display = 'none';
        else aspectBtn.style.display = 'flex';
        
        renderModelMenu();
    }

    function toggleModelMenu() {
        const menu = document.getElementById('modelMenu');
        const chevron = document.getElementById('modelChevron');
        const isHidden = menu.style.display === 'none' || menu.style.display === '';
        menu.style.display = isHidden ? 'flex' : 'none';
        chevron.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
        if(isHidden) document.getElementById('aspectMenu').style.display = 'none';
    }

    function renderAspectMenu() {
        const menu = document.getElementById('aspectMenu');
        menu.innerHTML = '';
        RATIOS.forEach(r => {
            const div = document.createElement('div');
            div.className = `menu-option`;
            div.onclick = () => {
                currentWidth = r.w; currentHeight = r.h;
                document.getElementById('currentAspectLabel').textContent = r.label;
                document.getElementById('currentAspectIcon').innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none">${r.icon}</svg>`;
                menu.style.display = 'none';
            };
            div.innerHTML = `
                <div style="display:flex; align-items:center; gap:10px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="color:white;">${r.icon}</svg>
                    <span style="font-size:13px; font-weight:600; color:white;">${r.label}</span>
                </div>
            `;
            menu.appendChild(div);
        });
        // Set default
        document.getElementById('currentAspectLabel').textContent = RATIOS[0].label;
        document.getElementById('currentAspectIcon').innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none">${RATIOS[0].icon}</svg>`;
    }

    function toggleAspectMenu(e) {
        if(e) e.stopPropagation();
        const menu = document.getElementById('aspectMenu');
        menu.style.display = (menu.style.display === 'none' || menu.style.display === '') ? 'flex' : 'none';
        document.getElementById('modelMenu').style.display = 'none';
    }

    function openBuyModal() { renderBuyGrid(); document.getElementById('buyModal').style.display = 'flex'; }

    function renderBuyGrid() {
        const grid = document.getElementById('buyGrid');
        grid.innerHTML = '';
        const t = TRANSLATIONS[currentLang];
        PACKAGES.forEach(pkg => {
            const piAmount = (pkg.usd / currentPiPrice).toFixed(4);
            const div = document.createElement('div');
            div.className = 'buy-card';
            div.onclick = () => buyTokens(pkg, piAmount);
            div.innerHTML = `
                <div class="buy-info"><span style="color:white; font-weight:700;">${pkg.tokens} ${t.tokens}</span><span style="color:#aaa; font-size:11px;">$${pkg.usd} ≈ ${piAmount} π</span></div>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="#f59e0b"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
            `;
            grid.appendChild(div);
        });
    }

    async function buyTokens(pkg, piAmount) {
        if (!piUser) { alert("Login first"); return; }
        try {
            const paymentData = { amount: parseFloat(piAmount), memo: `${pkg.tokens} Tokens - AIWay`, metadata: { type: "tokens", tokenAmount: pkg.tokens, pi_uid: piUser.uid } };
            await Pi.createPayment(paymentData, {
                onReadyForServerApproval: async (paymentId) => { await fetch('/.netlify/functions/approve', { method: 'POST', body: JSON.stringify({ paymentId }) }); },
                onReadyForServerCompletion: async (paymentId, txid) => {
                    const res = await fetch('/.netlify/functions/complete', {
                        method: 'POST', 
                        body: JSON.stringify({ paymentId, txid, pi_uid: piUser.uid, username: piUser.username, tokenAmount: pkg.tokens })
                    });
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    document.getElementById('tokenBalance').textContent = data.newBalance;
                    document.getElementById('buyModal').style.display = 'none';
                    alert(`+${pkg.tokens} Tokens!`);
                },
                onCancel: () => {}, onError: () => {}
            });
        } catch (e) { alert("Payment Failed"); }
    }

    function updateCooldownUI() {
        const now = Date.now();
        const btn = document.getElementById('sendBtn');
        const icon = document.getElementById('sendIcon');
        const countEl = document.getElementById('countdownEl');
        if (now < cooldownEndTime) {
            const remaining = Math.ceil((cooldownEndTime - now) / 1000);
            btn.disabled = true; icon.style.display = 'none'; countEl.style.display = 'block';
            countEl.innerText = `${remaining}s`;
            requestAnimationFrame(updateCooldownUI);
        } else {
            btn.disabled = false; icon.style.display = 'block'; countEl.style.display = 'none';
        }
    }

    async function sendPrompt() {
        if (Date.now() < cooldownEndTime) return;
        const input = document.getElementById('promptInput');
        const text = input.value.trim();
        if (!text || !piUser) return;

        addMessage(text, 'user');
        input.value = '';
        
        // Cooldown based on model type
        cooldownEndTime = Date.now() + (currentModel.type === 'video' ? 10000 : 5000);
        updateCooldownUI();

        const t = TRANSLATIONS[currentLang];
        let loadingId;

        // Custom Loader for Video
        if(currentModel.type === 'video') {
            loadingId = renderVideoLoader(t.videoCreating);
        } else {
            loadingId = renderLoader(t.generating);
        }

        try {
            const response = await fetch('/.netlify/functions/generate-and-save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    prompt: text, username: piUser.username, pi_uid: piUser.uid,
                    model: currentModel.id, type: currentModel.type, width: currentWidth, height: currentHeight
                })
            });

            if (response.status === 403) {
                document.getElementById(loadingId).remove();
                addNoTokenCard();
                return;
            }

            if (!response.ok) throw new Error('Server Error');

            const data = await response.json();
            
            // Stop timers
            if(videoTimerInterval) clearInterval(videoTimerInterval);
            document.getElementById(loadingId).remove();
            
            if(data.newBalance !== undefined) document.getElementById('tokenBalance').textContent = data.newBalance;

            // Handle Response Type
            if (currentModel.type === 'chat' && data.reply) {
                addBotChat(data.reply);
            } else if (currentModel.type === 'video' && data.imageUrl) {
                // Pollinations returns video as a URL in 'imageUrl' field usually
                addBotVideo(data.imageUrl);
            } else if (data.imageUrl) {
                addBotImage(data.imageUrl);
            } else {
                addMessage(t.error, 'bot');
            }

        } catch (error) {
            if(videoTimerInterval) clearInterval(videoTimerInterval);
            document.getElementById(loadingId).innerHTML = `<div style="color:#f59e0b; padding:10px;">⚠️ ${t.rateLimit}</div>`;
        }
    }

    function renderLoader(text) {
        const div = document.createElement('div');
        div.className = 'message bot';
        div.id = 'loading-' + Date.now();
        div.innerHTML = `<div class="loading-box"><div class="blur-wave"></div><div class="loading-text">${text}</div></div>`;
        document.getElementById('chatContainer').appendChild(div);
        scrollToBottom();
        return div.id;
    }

    // New Video Loader with Timer
    function renderVideoLoader(text) {
        const div = document.createElement('div');
        div.className = 'message bot';
        div.id = 'loading-' + Date.now();
        
        let seconds = 0;
        div.innerHTML = `
            <div class="loading-box" style="aspect-ratio: 16/9; width: 100%; max-width: 320px;">
                <div class="blur-wave"></div>
                <div class="loading-text">${text}</div>
                <div class="video-timer" id="vTimer-${div.id}">0s</div>
            </div>`;
        
        document.getElementById('chatContainer').appendChild(div);
        scrollToBottom();

        videoTimerInterval = setInterval(() => {
            seconds++;
            const el = document.getElementById(`vTimer-${div.id}`);
            if(el) el.innerText = `${seconds}s`;
        }, 1000);

        return div.id;
    }

    function addMessage(content, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerHTML = `<div class="msg-bubble">${content}</div>`;
        document.getElementById('chatContainer').appendChild(div);
        document.getElementById('emptyMsg').style.display = 'none';
        scrollToBottom();
    }

    function addBotChat(reply) {
        const div = document.createElement('div');
        div.className = 'message bot text-mode';
        // Parse Markdown
        const rawHtml = marked.parse(reply);
        div.innerHTML = `<div class="msg-bubble"><div class="markdown-content">${rawHtml}</div></div>`;
        document.getElementById('chatContainer').appendChild(div);
        scrollToBottom();
    }

    function addBotImage(url) {
        const t = TRANSLATIONS[currentLang];
        const div = document.createElement('div');
        div.className = 'message bot';
        let aspectRatio = currentWidth / currentHeight;
        div.innerHTML = `
            <div class="msg-bubble">
                <div class="media-container" style="aspect-ratio: ${aspectRatio};">
                    <img src="${url}" class="msg-image" onload="this.classList.add('loaded')">
                </div>
                <div class="download-bar">
                    <button class="d-btn" onclick="forceDownload('${url}')">${t.download}</button>
                </div>
            </div>
        `;
        document.getElementById('chatContainer').appendChild(div);
        scrollToBottom();
    }

    function addBotVideo(url) {
        const t = TRANSLATIONS[currentLang];
        const div = document.createElement('div');
        div.className = 'message bot';
        div.innerHTML = `
            <div class="msg-bubble">
                <div class="media-container" style="aspect-ratio: 16/9;">
                    <video src="${url}" class="msg-video" autoplay loop controls onloadstart="this.classList.add('loaded')"></video>
                </div>
                <div class="download-bar">
                    <button class="d-btn" onclick="forceDownload('${url}')">${t.download}</button>
                </div>
            </div>
        `;
        document.getElementById('chatContainer').appendChild(div);
        scrollToBottom();
    }

    function addNoTokenCard() {
        const t = TRANSLATIONS[currentLang];
        const div = document.createElement('div');
        div.className = 'message bot';
        div.innerHTML = `<div class="msg-bubble"><div class="no-token-card"><div style="color:#fca5a5; font-weight:600;">${t.noTokens}</div><button class="buy-now-btn" onclick="openBuyModal()">${t.buyNow}</button></div></div>`;
        document.getElementById('chatContainer').appendChild(div);
        scrollToBottom();
    }

    function scrollToBottom() {
        const c = document.getElementById('chatContainer');
        c.scrollTop = c.scrollHeight;
    }

    async function forceDownload(url) {
        const downloadUrl = url + "?download=";
        try {
            await navigator.clipboard.writeText(downloadUrl);
            document.getElementById('dlLinkBox').textContent = downloadUrl;
            document.getElementById('downloadInfoModal').style.display = 'flex';
        } catch (err) {
            prompt("Copy Link:", downloadUrl);
        }
    }

    // --- Gallery Logic (Simplified for brevity, same as before) ---
    async function openGallery() {
        if(!piUser) { alert("Login Required"); return; }
        document.getElementById('galleryModal').style.display = 'flex';
        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = 'Loading...';
        try {
            const res = await fetch(`/.netlify/functions/get-gallery?username=${piUser.username}`);
            const images = await res.json();
            grid.innerHTML = '';
            if(images.length === 0) grid.innerHTML = 'No Images';
            images.forEach(img => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `<img src="${img.url}"><div class="gallery-actions"><button class="g-btn g-dl" onclick="forceDownload('${img.url}')">⬇</button></div>`;
                grid.appendChild(div);
            });
        } catch (e) { grid.innerHTML = 'Error'; }
    }

    document.addEventListener('click', (e) => {
        if(!e.target.closest('#modelMenu') && !e.target.closest('.header-title-area')) document.getElementById('modelMenu').style.display = 'none';
        if(!e.target.closest('#aspectMenu') && !e.target.closest('#aspectTriggerBtn')) document.getElementById('aspectMenu').style.display = 'none';
    });
</script>
</body>
