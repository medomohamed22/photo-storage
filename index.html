<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"/>
<title>Nano Banana - Pi Edition</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
/* --- Design System (نفس التصميم السابق مع إضافات) --- */
:root {
    --bg: #09090b;
    --chat-bg: #000000;
    --card: #18181b;
    --accent: #d1fa31;
    --pi-gold: #fbbf24; /* لون مميز لشبكة باي */
    --text-main: #ffffff;
    --text-sub: #a1a1aa;
    --border: #27272a;
    --error: #ef4444;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--chat-bg); color: var(--text-main);
    display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
}

/* --- Landing Page --- */
.landing-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #000; z-index: 9999;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px; text-align: center;
    transition: opacity 0.5s ease;
}
.landing-logo { font-size: 60px; margin-bottom: 20px; text-shadow: 0 0 30px rgba(209, 250, 49, 0.4); }
.landing-title { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
.pi-login-btn {
    background: linear-gradient(135deg, #611f69 0%, #4a1452 100%); /* Pi Color Theme */
    color: #fff; border: 1px solid #fbbf24;
    padding: 14px 40px; border-radius: 30px;
    font-weight: 700; font-size: 16px; cursor: pointer;
    box-shadow: 0 0 20px rgba(97, 31, 105, 0.5);
    display: flex; align-items: center; gap: 10px;
    margin-top: 20px;
}
.pi-login-btn svg { width: 24px; height: 24px; fill: #fbbf24; }

/* --- Header --- */
.header {
    padding: 10px 16px; background: rgba(9, 9, 11, 0.95);
    backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    height: 60px; flex-shrink: 0; z-index: 100;
}
.user-info-display {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 600;
    color: var(--pi-gold);
    background: rgba(251, 191, 36, 0.1);
    padding: 4px 10px; border-radius: 20px;
    border: 1px solid rgba(251, 191, 36, 0.2);
}
.header-actions { display: flex; gap: 8px; }
.gallery-btn-header {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text-main); padding: 6px 12px; border-radius: 20px;
    font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 5px;
}

/* --- Chat Area & Messages --- */
.chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 20px; }
.message { display: flex; flex-direction: column; max-width: 90%; animation: slideUp 0.3s ease; }
.message.user { align-self: flex-end; } 
.message.bot { align-self: flex-start; }
.msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
.message.user .msg-bubble { background: #27272a; color: #fff; border-bottom-left-radius: 4px; }
.message.bot .msg-bubble { background: transparent; padding: 0; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; width: 100%; max-width: 320px; }

/* Images */
.msg-image { width: 100%; height: auto; display: block; }
.download-bar {
    padding: 10px; background: #111; display: flex; justify-content: center;
    border-top: 1px solid #222;
}
.d-btn {
    background: var(--accent); color: black; border: none;
    padding: 8px 20px; border-radius: 8px; font-weight: 700; font-size: 12px;
    cursor: pointer; width: 100%;
}

/* --- Gallery Modal --- */
.gallery-modal {
    position: fixed; inset: 0; background: #000; z-index: 500; display: none; flex-direction: column;
}
.gallery-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #111; }
.gallery-grid { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.gallery-item { position: relative; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
.gallery-actions { display: flex; gap: 5px; padding: 5px; background: #222; }
.g-btn { flex: 1; border: none; padding: 8px; font-size: 10px; cursor: pointer; color: white; border-radius: 4px; }
.g-del { background: #ef4444; }
.g-down { background: var(--accent); color: black; }

/* --- Footer --- */
.footer-container { background: #09090b; border-top: 1px solid var(--border); padding: 10px; display: flex; gap: 10px; }
.input-box { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 12px; color: white; outline: none; }
.send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }

@keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

    <div id="landingPage" class="landing-overlay">
        <div class="landing-logo">🍌</div>
        <div class="landing-title">Nano Banana AI</div>
        <div style="color:#888; margin-bottom:30px;">توليد صور بالذكاء الاصطناعي</div>
        
        <button class="pi-login-btn" onclick="authenticatePi()">
            <svg viewBox="0 0 32 32"><path d="M16 32C7.163 32 0 24.837 0 16S7.163 0 16 0s16 7.163 16 16-7.163 16-16 16zm-2.5-22h-3v12h3V10zm8 0h-3v12h3V10z"/></svg>
            تسجيل الدخول باستخدام Pi
        </button>
    </div>

    <div class="header">
        <div style="display:flex; flex-direction:column;">
            <div style="font-weight:700; font-size:16px;">Nano Banana</div>
            <div id="piUserInfo" class="user-info-display" style="display:none;">
                <span>@<span id="txtUsername">...</span></span>
            </div>
        </div>
        <div class="header-actions">
            <button class="gallery-btn-header" onclick="openGallery()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M22 16V4c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2zm-11-4l2.03 2.71L16 11l4 5H8l3-4z"/></svg>
                معرضي
            </button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div style="text-align:center; color:#555; margin-top:50px;" id="emptyMsg">
            مرحباً! اكتب وصفاً للصورة التي تريد تخيلها.
        </div>
    </div>

    <div class="footer-container">
        <textarea id="promptInput" class="input-box" rows="1" placeholder="تخيل أي شيء..." dir="auto"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendPrompt()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <div id="galleryModal" class="gallery-modal">
        <div class="gallery-header">
            <span style="font-weight:700; color:white;">معرض صوري</span>
            <button onclick="document.getElementById('galleryModal').style.display='none'" style="background:none; border:none; color:white; font-size:20px;">✕</button>
        </div>
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

<script>
    // تهيئة Pi SDK
    const Pi = window.Pi;
    let piUser = null;

    // استدعاء التهيئة فور التحميل
    document.addEventListener('DOMContentLoaded', () => {
        try {
            Pi.init({ version: "2.0", sandbox: false }); // اجعلها false عند النشر النهائي
        } catch (e) { console.error("Pi Init Error:", e); }
    });

    // 1. تسجيل الدخول
    async function authenticatePi() {
        try {
            const scopes = ['username']; // نحتاج اسم المستخدم فقط للربط
            const auth = await Pi.authenticate(scopes, onIncompletePayment);
            
            if(auth.user) {
                piUser = auth.user;
                document.getElementById('landingPage').style.display = 'none';
                document.getElementById('piUserInfo').style.display = 'flex';
                document.getElementById('txtUsername').textContent = piUser.username;
                
                // حفظ التوكن مؤقتاً إذا احتجت له (اختياري)
                localStorage.setItem('pi_user', JSON.stringify(piUser));
            }
        } catch (err) {
            console.error(err);
            alert("فشل تسجيل الدخول. يرجى المحاولة من داخل متصفح Pi.");
        }
    }

    function onIncompletePayment(payment) {
        // معالجة المدفوعات غير المكتملة إذا أضفت دفع مستقبلاً
        console.log("Incomplete Payment found", payment);
    }

    // 2. إرسال البرومبت (Generate)
    async function sendPrompt() {
        const input = document.getElementById('promptInput');
        const text = input.value.trim();
        if (!text || !piUser) return;

        // إضافة رسالة المستخدم
        addMessage(text, 'user');
        input.value = '';
        
        // مؤشر التحميل
        const loadingId = addMessage('جاري الإنشاء... (قد يستغرق 30 ثانية)', 'bot', true);

        try {
            // ملاحظة: نرسل اسم المستخدم للباك اند لربط الصورة به
            const response = await fetch('/.netlify/functions/generate-and-save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    prompt: text,
                    username: piUser.username, // المفتاح السري هنا: اسم المستخدم
                    uid: piUser.uid
                })
            });

            if (!response.ok) throw new Error('Server Error');

            const data = await response.json();
            
            // إزالة مؤشر التحميل وعرض الصورة
            document.getElementById(loadingId).remove();
            
            if(data.imageUrl) {
                addBotImage(data.imageUrl, data.imageId);
            } else {
                addMessage('حدث خطأ في استجابة السيرفر.', 'bot');
            }

        } catch (error) {
            document.getElementById(loadingId).innerHTML = '<div style="color:red">فشل الإنشاء. حاول مرة أخرى.</div>';
            console.error(error);
        }
    }

    // 3. فتح المعرض (جلب الصور الخاصة بالمستخدم فقط)
    async function openGallery() {
        if(!piUser) { alert("يجب تسجيل الدخول أولاً"); return; }
        
        const modal = document.getElementById('galleryModal');
        const grid = document.getElementById('galleryGrid');
        modal.style.display = 'flex';
        grid.innerHTML = '<div style="color:white; text-align:center;">جاري التحميل...</div>';

        try {
            const res = await fetch(`/.netlify/functions/get-gallery?username=${piUser.username}`);
            const images = await res.json();

            grid.innerHTML = '';
            if(images.length === 0) {
                grid.innerHTML = '<div style="color:#777; padding:20px;">لا توجد صور محفوظة.</div>';
                return;
            }

            images.forEach(img => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `
                    <img src="${img.url}" style="width:100%; aspect-ratio:1; object-fit:cover;">
                    <div class="gallery-actions">
                        <button class="g-btn g-down" onclick="forceDownload('${img.url}')">تحميل</button>
                        <button class="g-btn g-del" onclick="deleteImage('${img.id}', this)">حذف</button>
                    </div>
                `;
                grid.appendChild(div);
            });

        } catch (e) {
            grid.innerHTML = '<div style="color:red">فشل تحميل المعرض</div>';
        }
    }

    // 4. حذف الصورة
    async function deleteImage(imageId, btn) {
        if(!confirm('هل أنت متأكد من حذف هذه الصورة؟')) return;
        
        const parent = btn.closest('.gallery-item');
        parent.style.opacity = '0.5';

        try {
            const res = await fetch('/.netlify/functions/delete-image', {
                method: 'POST',
                body: JSON.stringify({ id: imageId, username: piUser.username })
            });
            
            if(res.ok) {
                parent.remove();
            } else {
                alert("فشل الحذف");
                parent.style.opacity = '1';
            }
        } catch(e) { console.error(e); }
    }

    // 5. التحميل داخل Pi Browser
    // Pi Browser في بعض الأحيان يمنع التنزيل المباشر، لذا نستخدم خدعة Blob
    async function forceDownload(url) {
        const btn = event.target;
        const oldText = btn.innerText;
        btn.innerText = '...';
        
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = blobUrl;
            a.download = `Nano-Pi-${Date.now()}.jpg`;
            
            document.body.appendChild(a);
            a.click();
            
            setTimeout(() => {
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
                btn.innerText = oldText;
            }, 100);
            
        } catch (e) {
            alert('فشل التحميل التلقائي. سيتم فتح الصورة في نافذة جديدة.');
            window.open(url, '_blank');
            btn.innerText = oldText;
        }
    }

    // دوال مساعدة للواجهة
    function addMessage(content, type, isLoading = false) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        if(isLoading) div.id = 'msg-' + Date.now();
        div.innerHTML = `<div class="msg-bubble">${content}</div>`;
        document.getElementById('chatContainer').appendChild(div);
        document.getElementById('emptyMsg').style.display = 'none';
        return div.id;
    }

    function addBotImage(url, id) {
        const div = document.createElement('div');
        div.className = 'message bot';
        div.innerHTML = `
            <div class="msg-bubble">
                <img src="${url}" class="msg-image" loading="lazy">
                <div class="download-bar">
                    <button class="d-btn" onclick="forceDownload('${url}')">تحميل الصورة</button>
                </div>
            </div>
        `;
        document.getElementById('chatContainer').appendChild(div);
    }
</script>
</body>
</html>
