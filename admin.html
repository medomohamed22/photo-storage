<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIWay Admin Dashboard</title>
    <style>
        :root {
            --bg: #09090b;
            --card-bg: #18181b;
            --accent: #fbbf24; /* Gold */
            --purple: #611f69;
            --text: #ffffff;
            --text-sub: #a1a1aa;
            --border: #27272a;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

        /* Login Screen */
        #loginOverlay {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: var(--card-bg); padding: 40px; border-radius: 20px;
            border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 0 50px rgba(97, 31, 105, 0.2);
        }
        .login-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: var(--accent); }
        .inp {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px;
            border: 1px solid var(--border); background: #000; color: white; outline: none; text-align: center;
        }
        .btn-login {
            width: 100%; padding: 12px; background: var(--purple); color: var(--accent);
            font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .btn-login:hover { background: #4a1550; }

        /* Dashboard */
        .dashboard { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; width: 100%; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .brand { font-size: 28px; font-weight: 900; background: linear-gradient(135deg, var(--purple), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logout-btn { background: #333; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent); }
        .card-title { color: var(--text-sub); font-size: 14px; margin-bottom: 10px; }
        .card-value { font-size: 28px; font-weight: bold; }
        .card-sub { font-size: 12px; color: var(--success); margin-top: 5px; }

        /* Table */
        .table-container { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        .table-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .search-inp { padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); background: #000; color: white; width: 250px; text-align: right; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { color: var(--text-sub); font-weight: 600; background: rgba(0,0,0,0.2); }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .user-badge { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 32px; height: 32px; background: var(--purple); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--accent); font-size: 12px; }

        .refresh-btn {
            background: var(--accent); color: #000; border: none; padding: 8px 15px; 
            border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px;
        }
        .loading { opacity: 0.7; pointer-events: none; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <div class="login-title">🔒 دخول المدير</div>
            <input type="password" id="adminPass" class="inp" placeholder="كلمة المرور السرية">
            <button class="btn-login" onclick="login()">دخول</button>
            <div id="loginMsg" style="color: red; margin-top: 10px; font-size: 12px;"></div>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="header">
            <div class="brand">AIWay Admin</div>
            <div style="display:flex; gap:10px;">
                <button class="refresh-btn" onclick="fetchData(this)">تحديث ↻</button>
                <button class="logout-btn" onclick="logout()">خروج</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="card">
                <div class="card-title">إجمالي المبيعات (USD)</div>
                <div class="card-value" id="totalUSD">$0.00</div>
                <div class="card-sub">المبلغ الكلي</div>
            </div>
            <div class="card" style="--accent: #611f69;">
                <div class="card-title">إجمالي المبيعات (Pi)</div>
                <div class="card-value" id="totalPi">0.00 π</div>
                <div class="card-sub">عملات باي المستلمة</div>
            </div>
            <div class="card" style="--accent: #10b981;">
                <div class="card-title">صافي الأرباح (100% Markup)</div>
                <div class="card-value" id="totalProfit" style="color: #10b981;">$0.00</div>
                <div class="card-sub">نصف إجمالي الدولار</div>
            </div>
            <div class="card" style="--accent: #3b82f6;">
                <div class="card-title">المستخدمين</div>
                <div class="card-value" id="totalUsers">0</div>
                <div class="card-sub">المسجلين في الموقع</div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <span style="font-weight:700;">سجل المستخدمين</span>
                <input type="text" class="search-inp" placeholder="بحث..." onkeyup="filterTable(this.value)">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>المستخدم</th>
                        <th>الرصيد الحالي</th>
                        <th>دفع (USD)</th>
                        <th>دفع (Pi)</th>
                        <th>تاريخ التسجيل</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody"></tbody>
            </table>
        </div>
    </div>

<script>
    // تخزين كلمة المرور مؤقتاً في الجلسة لتحديث البيانات دون طلبها مجدداً
    let sessionPass = localStorage.getItem('admin_pass') || '';

    // --- Login Logic ---
    async function login() {
        const password = document.getElementById('adminPass').value;
        const msg = document.getElementById('loginMsg');
        
        if(!password) { msg.textContent = "ادخل كلمة المرور"; return; }

        msg.textContent = "جاري الاتصال...";
        
        // نجرب جلب البيانات للتأكد من كلمة المرور
        const success = await fetchData(null, password);
        
        if (success) {
            localStorage.setItem('admin_pass', password);
            sessionPass = password;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        } else {
            msg.textContent = "كلمة المرور غير صحيحة";
        }
    }

    async function logout() {
        localStorage.removeItem('admin_pass');
        window.location.reload();
    }

    // --- Fetch Data from Backend API ---
    async function fetchData(btn = null, passOverride = null) {
        if(btn) btn.classList.add('loading');
        
        const passToSend = passOverride || sessionPass;

        try {
            const res = await fetch('/.netlify/functions/get-admin-stats', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: passToSend })
            });

            if (res.status === 401) return false; // Wrong Password
            if (!res.ok) throw new Error("Server Error");

            const data = await res.json();
            renderDashboard(data);
            return true;

        } catch (err) {
            console.error(err);
            if(!passOverride) alert("فشل الاتصال بالسيرفر");
            return false;
        } finally {
            if(btn) btn.classList.remove('loading');
        }
    }

    // --- Render Logic ---
    function renderDashboard(data) {
        const { users, stats } = data;
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = '';

        // Stats Cards
        document.getElementById('totalUSD').textContent = `$${stats.totalUSD.toFixed(2)}`;
        document.getElementById('totalPi').textContent = `${stats.totalPi.toFixed(4)} π`;
        document.getElementById('totalProfit').textContent = `$${(stats.totalUSD / 2).toFixed(2)}`;
        document.getElementById('totalUsers').textContent = stats.totalUsers;

        // Table
        users.forEach(user => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <div class="user-badge">
                        <div class="avatar">${user.username ? user.username.substring(0,2).toUpperCase() : '??'}</div>
                        <div>${user.username || 'Unknown'}</div>
                    </div>
                </td>
                <td style="color: var(--accent); font-weight:bold;">${user.token_balance || 0}</td>
                <td>$${(user.total_usd_spent || 0).toFixed(2)}</td>
                <td>${(user.total_pi_spent || 0).toFixed(4)} π</td>
                <td style="color: var(--text-sub); font-size:12px;">
                    ${new Date(user.created_at).toLocaleDateString('en-GB')}
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // --- Search ---
    function filterTable(query) {
        const rows = document.querySelectorAll('#usersTableBody tr');
        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(query.toLowerCase()) ? '' : 'none';
        });
    }

    // Check Session on Load
    window.onload = () => {
        if (sessionPass) {
            // محاولة الدخول المباشر إذا كانت كلمة المرور محفوظة
            fetchData(null, sessionPass).then(success => {
                if(success) {
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                }
            });
        }
    };
</script>

</body>
</html>
