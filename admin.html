<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealWay - لوحة الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary-purple: #5b50e5;
            --primary-orange: #d98a36;
            --bg-color: #f4f7fe;
            --card-bg: #ffffff;
            --text-dark: #2b3674;
            --text-light: #a3aed1;
            --border-color: #e9edf7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body { display: flex; background-color: var(--bg-color); color: var(--text-dark); min-height: 100vh; }

        .sidebar {
            width: 250px; background-color: var(--card-bg); padding: 20px;
            box-shadow: 2px 0 15px rgba(0,0,0,0.03); display: flex; flex-direction: column;
        }
        .logo { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 40px; }
        .logo span:first-child { color: var(--primary-purple); }
        .logo span:last-child { color: var(--primary-orange); }
        .nav-links { display: flex; flex-direction: column; gap: 15px; }
        .nav-links a {
            text-decoration: none; color: var(--text-light); padding: 12px 15px;
            border-radius: 10px; display: flex; align-items: center; gap: 10px; font-weight: 600; transition: 0.3s;
        }
        .nav-links a:hover, .nav-links a.active {
            background-color: var(--primary-purple); color: white;
        }

        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background-color: var(--card-bg); padding: 20px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02); display: flex; align-items: center; gap: 15px;
        }
        .stat-icon {
            width: 50px; height: 50px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: 20px;
            background-color: rgba(91, 80, 229, 0.1); color: var(--primary-purple);
        }
        .stat-info h3 { font-size: 14px; color: var(--text-light); margin-bottom: 5px; }
        .stat-info p { font-size: 24px; font-weight: 700; }

        .form-container {
            background-color: var(--card-bg); padding: 25px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            position: relative;
        }
        .form-container h2 { margin-bottom: 20px; font-size: 18px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group.full-width { grid-column: 1 / -1; }
        
        input[type="text"], input[type="number"], select {
            padding: 10px 15px; border: 1px solid var(--border-color); border-radius: 8px;
            outline: none; font-size: 14px; width: 100%;
        }
        
        /* تنسيق خاص لحقل رفع الصورة */
        input[type="file"] {
            padding: 8px; border: 1px dashed var(--primary-purple); border-radius: 8px;
            background-color: rgba(91, 80, 229, 0.05); cursor: pointer;
        }

        input:focus, select:focus { border-color: var(--primary-purple); }
        
        .btn-submit {
            background-color: var(--primary-purple); color: white; border: none;
            padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600;
            margin-top: 15px; width: 100%; transition: 0.3s;
        }
        .btn-submit:hover { background-color: #483ebd; }
        .btn-submit:disabled { background-color: #ccc; cursor: not-allowed; }

        /* رسالة التحميل */
        #loading-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); border-radius: 15px;
            justify-content: center; align-items: center; flex-direction: column; gap: 10px;
            color: var(--primary-purple); font-weight: bold;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; padding: 15px; flex-direction: row; justify-content: space-between; align-items: center; }
            .logo { margin-bottom: 0; }
            .nav-links { flex-direction: row; }
            .nav-links span { display: none; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo"><span>Deal</span><span>Way</span></div>
        <nav class="nav-links">
            <a href="#" class="active"><i class="fa-solid fa-chart-pie"></i> <span>الرئيسية</span></a>
            <a href="#"><i class="fa-solid fa-box"></i> <span>المنتجات</span></a>
            <a href="#"><i class="fa-solid fa-users"></i> <span>المستخدمين</span></a>
            <a href="index.html"><i class="fa-solid fa-arrow-right-from-bracket"></i> <span>العودة للموقع</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="header">
            <h2>لوحة التحكم</h2>
            <div style="font-weight: 600;">مرحباً، أدمن</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-box"></i></div>
                <div class="stat-info">
                    <h3>إجمالي المنتجات</h3>
                    <p id="total-products">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background-color: rgba(217, 138, 54, 0.1); color: var(--primary-orange);"><i class="fa-solid fa-users"></i></div>
                <div class="stat-info">
                    <h3>المستخدمين</h3>
                    <p id="total-users">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background-color: rgba(46, 204, 113, 0.1); color: #2ecc71;"><i class="fa-solid fa-coins"></i></div>
                <div class="stat-info">
                    <h3>مبيعات Pi</h3>
                    <p>π 150</p> 
                </div>
            </div>
        </div>

        <div class="form-container">
            <div id="loading-overlay">
                <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                <span>جاري الرفع...</span>
            </div>
            <h2>إضافة منتج جديد</h2>
            <form id="addProductForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>اسم المنتج</label>
                        <input type="text" id="p_title" required placeholder="مثال: حقيبة جلدية">
                    </div>
                    <div class="form-group">
                        <label>السعر (Pi)</label>
                        <input type="number" step="0.01" id="p_price" required placeholder="مثال: 1.5">
                    </div>
                    <div class="form-group">
                        <label>القسم</label>
                        <select id="p_category">
                            <option value="2">سيارات</option>
                            <option value="3">إلكترونيات</option>
                            <option value="1">أخرى</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>الموقع (Location)</label>
                        <input type="text" id="p_location" required placeholder="مثال: مصر، القاهرة">
                    </div>
                    <div class="form-group full-width">
                        <label>صورة المنتج</label>
                        <input type="file" id="p_image_file" accept="image/*" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="submit-btn">نشر المنتج <i class="fa-solid fa-plus"></i></button>
            </form>
        </div>
    </main>

    <script>
        // إعدادات Supabase الخاصة بك
        const SUPABASE_URL = 'https://jtbxdymviqmfhffixmat.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_godTBImi2vbpHJ1IA8BBrA_dfcZSHXW';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // دالة لرفع الصورة للـ Storage وجلب الرابط الخاص بها
        async function uploadImage(file) {
            // إنشاء اسم فريد للصورة لتجنب التكرار
            const fileExt = file.name.split('.').pop();
            const fileName = `${Math.random()}.${fileExt}`;
            const filePath = `${fileName}`;

            // رفع الصورة للـ Bucket المسمى 'products-images'
            let { error: uploadError } = await supabase.storage
                .from('products-images')
                .upload(filePath, file);

            if (uploadError) {
                throw uploadError;
            }

            // جلب الرابط العام (Public URL) للصورة المرفوعة
            const { data } = supabase.storage
                .from('products-images')
                .getPublicUrl(filePath);

            return data.publicUrl;
        }

        // دالة التعامل مع فورم الإضافة
        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const overlay = document.getElementById('loading-overlay');
            const imageFile = document.getElementById('p_image_file').files[0];
            
            const title = document.getElementById('p_title').value;
            const price = document.getElementById('p_price').value;
            const category_id = document.getElementById('p_category').value;
            const location = document.getElementById('p_location').value;

            // تفعيل حالة التحميل
            btn.disabled = true;
            overlay.style.display = 'flex';

            try {
                // 1. رفع الصورة أولاً وجلب الرابط
                let imageUrl = null;
                if (imageFile) {
                    imageUrl = await uploadImage(imageFile);
                }

                // 2. إدخال بيانات المنتج مع رابط الصورة في قاعدة البيانات
                const { data, error } = await supabase
                    .from('products')
                    .insert([
                        { 
                            title: title, 
                            price: price, 
                            category_id: category_id, 
                            location: location, 
                            image_url: imageUrl 
                        }
                    ]);

                if (error) throw error;
                
                alert('تم إضافة المنتج بنجاح!');
                document.getElementById('addProductForm').reset();
                fetchStats(); // تحديث الإحصائيات
                
            } catch (error) {
                console.error("خطأ:", error.message);
                alert("حدث خطأ أثناء الإضافة: " + error.message);
            } finally {
                // إلغاء حالة التحميل
                btn.disabled = false;
                overlay.style.display = 'none';
            }
        });

        // دالة لجلب إحصائيات الموقع
        async function fetchStats() {
            try {
                // جلب عدد المنتجات
                const { count: productsCount, error: productsError } = await supabase
                    .from('products')
                    .select('*', { count: 'exact', head: true });
                
                if (!productsError) {
                    document.getElementById('total-products').innerText = productsCount || 0;
                }

                // جلب عدد المستخدمين
                // تأكد من وجود جدول profiles، أو استخدم جدول auth.users إذا كان متاحاً
                /*
                const { count: usersCount, error: usersError } = await supabase
                    .from('profiles')
                    .select('*', { count: 'exact', head: true });
                
                if (!usersError) {
                    document.getElementById('total-users').innerText = usersCount || 0;
                }
                */
            } catch (error) {
                console.error("خطأ في جلب الإحصائيات:", error.message);
            }
        }

        window.onload = () => {
            fetchStats();
        };
    </script>
</body>
</html>
